<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>飞书 CLI 介绍</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="../sdk/fonts.css" />
    <link rel="stylesheet" href="../sdk/lark-slides.css" />
    <style>
      .cli-muted span,
      .cli-muted p {
        color: #aeb7c7 !important;
        -webkit-text-fill-color: #aeb7c7 !important;
        white-space: normal !important;
      }

      .cli-code span {
        font-family: "SFMono-Regular", Menlo, Consolas, monospace !important;
      }

      .cli-code,
      .cli-code p,
      .cli-code span {
        white-space: normal !important;
        overflow-wrap: anywhere;
      }

      .cli-wrap,
      .cli-wrap p,
      .cli-wrap span {
        white-space: pre-line !important;
        overflow-wrap: break-word;
      }

      .cli-stage-code,
      .cli-stage-code * {
        font-family: "SFMono-Regular", Menlo, Consolas, monospace !important;
      }

      .cli-stage-code {
        color: #dceeff;
        font-size: 16px;
        line-height: 1.52;
        letter-spacing: 0;
      }

      .cli-stage-code .muted {
        color: #7e8a9c;
      }

      .cli-flow line,
      .cli-flow path {
        stroke-dasharray: 18 16;
      }

      .ls-slide.is-active .cli-flow line,
      .ls-slide.is-active .cli-flow path {
        animation: cli-dash 2.6s linear infinite;
      }

      .ls-slide.is-active .cli-rise-a {
        animation: cli-rise 0.55s ease-out both;
      }

      .ls-slide.is-active .cli-rise-b {
        animation: cli-rise 0.55s ease-out 0.12s both;
      }

      .ls-slide.is-active .cli-rise-c {
        animation: cli-rise 0.55s ease-out 0.24s both;
      }

      .ls-slide.is-active .cli-rise-d {
        animation: cli-rise 0.55s ease-out 0.36s both;
      }

      .cli-install {
        position: absolute;
        inset: 0;
        color: #f7f9ff;
        font-family: var(--ld-font-zh), "PingFang SC", sans-serif;
      }

      .cli-install-steps {
        position: absolute;
        left: 30px;
        top: 26px;
        display: flex;
        gap: 10px;
      }

      .cli-install-step,
      .cli-copy {
        height: 34px;
        border: 1px solid rgba(62, 195, 247, 0.42);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.035);
        color: #d8f4ff;
        font: 600 15px var(--ld-font-zh), "PingFang SC", sans-serif;
        padding: 0 14px;
        cursor: pointer;
      }

      .cli-install-step.is-active {
        background: rgba(62, 195, 247, 0.16);
        color: #ffffff;
        border-color: rgba(62, 195, 247, 0.82);
      }

      .cli-install-command {
        position: absolute;
        left: 34px;
        right: 136px;
        top: 84px;
        height: 54px;
        display: flex;
        align-items: center;
        padding: 0 18px;
        border-radius: 7px;
        background: rgba(3, 10, 23, 0.82);
        border: 1px solid rgba(255, 255, 255, 0.16);
        font: 22px "SFMono-Regular", Menlo, Consolas, monospace;
        color: #f7f9ff;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .cli-copy {
        position: absolute;
        right: 34px;
        top: 94px;
        width: 88px;
        padding: 0 10px;
        text-align: center;
        white-space: nowrap;
      }

      .cli-install-note {
        position: absolute;
        left: 36px;
        top: 158px;
        width: 690px;
        color: #aeb7c7;
        font-size: 21px;
        line-height: 1.38;
      }

      .cli-install-status {
        position: absolute;
        right: 34px;
        top: 28px;
        min-width: 72px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 10px;
        border-radius: 999px;
        background: rgba(98, 217, 156, 0.12);
        border: 1px solid rgba(98, 217, 156, 0.38);
        color: #62d99c;
        font: 15px "SFMono-Regular", Menlo, Consolas, monospace;
      }

      @keyframes cli-dash {
        to { stroke-dashoffset: -68; }
      }

      @keyframes cli-rise {
        from { opacity: 0; transform: translateY(14px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @media (prefers-reduced-motion: reduce) {
        .cli-flow line,
        .cli-flow path,
        .cli-rise-a,
        .cli-rise-b,
        .cli-rise-c,
        .cli-rise-d {
          animation: none !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="deck" data-lark-deck data-lark-cli-intro></div>
    <script src="../sdk/lark-slides.js"></script>
    <script src="../sdk/templates.js"></script>
    <script>
      const A = (name) => `assets/pptx-media/${name}`;
      const T = LarkSlideTemplates;
      const C = T.components;
      const FRAME = { x: 120, w: 1360 };

      function bg() {
        return [
          C.imageBlock({ src: A("e2cc3c0d5dc3155d.png") }),
          C.imageBlock({ src: A("b4906f8983e9cecf.png"), x: 34, y: -900, w: 1532, h: 1800 }),
          C.imageBlock({ src: A("fe0be4b4d6325923.png") }),
        ];
      }

      function text({ x, y, w, h, value, size = 34, weight = 620, color = "#f7f8fb", align = "left", gradient = "", className = "", lineHeight = 1.18 }) {
        return C.textBlock({ x, y, w, h, text: value, size, weight, color, align, gradient, className, lineHeight });
      }

      function htmlText({ x, y, w, h, html, className = "" }) {
        return { kind: "text", className, style: `left:${x}px;top:${y}px;width:${w}px;height:${h}px;background:transparent;`, html };
      }

      function raw({ x, y, w, h, html, className = "" }) {
        return C.vectorBlock({ x, y, w, h, html, className });
      }

      function title({ title, subtitle, y = 92, w = 1120 }) {
        return [
          text({ x: FRAME.x, y, w, h: 68, value: title, size: 54, weight: 760, gradient: "brand" }),
          text({ x: FRAME.x + 2, y: y + 78, w: Math.min(w, 1010), h: 44, value: subtitle, size: 27, weight: 500, color: "#aeb7c7", className: "cli-muted" }),
        ];
      }

      function panel({ x, y, w, h, border = "rgba(255,255,255,0.18)", fill = "rgba(255,255,255,0.048)", className = "" }) {
        return C.shapeBlock({ x, y, w, h, fill, radius: "8px", border: `1.2px solid ${border}`, className });
      }

      function card({ x, y, w, h, eyebrow, title, body, className = "" }) {
        return [
          panel({ x, y, w, h, className }),
          text({ x: x + 28, y: y + 24, w: w - 56, h: 24, value: eyebrow, size: 18, weight: 760, gradient: "deepBlue" }),
          text({ x: x + 28, y: y + 60, w: w - 56, h: 36, value: title, size: 30, weight: 740, gradient: "brand" }),
          text({ x: x + 28, y: y + 112, w: w - 56, h: h - 132, value: body, size: 22, weight: 480, color: "#aeb7c7", lineHeight: 1.38, className: "cli-muted" }),
        ];
      }

      function metric({ x, y, w, value, label, suffix = "" }) {
        return [
          C.shapeBlock({ x, y, w, h: 118, fill: "rgba(3,10,23,0.52)", radius: "8px", border: "1.1px solid rgba(62,195,247,0.26)" }),
          text({ x: x + 18, y: y + 22, w: w - 36, h: 44, value, size: 43, weight: 780, align: "center", gradient: "soft", className: "cli-code" }),
          text({ x: x + 18, y: y + 68, w: w - 36, h: 26, value: `${label}${suffix}`, size: 19, weight: 560, align: "center", color: "#aeb7c7", className: "cli-muted" }),
        ];
      }

      function stageCard({ x, y, w, h, label, title, body, code = "", className = "" }) {
        const blocks = [
          panel({ x, y, w, h, className }),
          text({ x: x + 28, y: y + 28, w: w - 56, h: 28, value: label, size: 20, weight: 720, gradient: "deepBlue" }),
          text({ x: x + 28, y: y + 72, w: w - 56, h: 40, value: title, size: 30, weight: 740, gradient: "brand" }),
          text({ x: x + 28, y: y + 128, w: w - 56, h: code ? 64 : h - 150, value: body, size: 21, weight: 480, color: "#aeb7c7", lineHeight: 1.35, className: "cli-muted" }),
        ];
        if (code) {
          blocks.push(htmlText({
            x: x + 28,
            y: y + h - 76,
            w: w - 56,
            h: 54,
            className: "cli-stage-code",
            html: `<div class="cli-stage-code">${code}</div>`,
          }));
        }
        return blocks;
      }

      function miniStep({ x, y, w, h, title, body, command, className = "" }) {
        return [
          panel({ x, y, w, h, border: "rgba(62,195,247,0.28)", fill: "rgba(255,255,255,0.04)", className }),
          text({ x: x + 28, y: y + 28, w: w - 56, h: 36, value: title, size: 29, weight: 740, gradient: "brand" }),
          text({ x: x + 28, y: y + 78, w: w - 56, h: 54, value: body, size: 21, weight: 480, color: "#aeb7c7", lineHeight: 1.3, className: "cli-muted" }),
          htmlText({ x: x + 28, y: y + h - 54, w: w - 56, h: 30, className: "cli-stage-code", html: `<div class="cli-stage-code"><span class="muted">$</span> ${command}</div>` }),
        ];
      }

      function flowLine({ x, y, w, id = "flow", h = 24 }) {
        return C.vectorBlock({
          x,
          y,
          w,
          h,
          className: "cli-flow",
          html: `<svg viewBox="0 0 ${w} ${h}" width="100%" height="100%" preserveAspectRatio="none"><line x1="0" y1="${h / 2}" x2="${w}" y2="${h / 2}" stroke="url(#${id})" stroke-width="4" stroke-linecap="round"/><defs><linearGradient id="${id}" x1="0" x2="1"><stop offset="0" stop-color="#ceeafe"/><stop offset="0.55" stop-color="#3ec3f7"/><stop offset="1" stop-color="#1456f0"/></linearGradient></defs></svg>`,
        });
      }

      function tag({ x, y, w, label, className = "" }) {
        return [
          C.shapeBlock({ x, y, w, h: 42, fill: "rgba(255,255,255,0.035)", radius: "6px", border: "1.1px solid rgba(62,195,247,0.28)", className }),
          text({ x, y: y + 8, w, h: 26, value: label, size: 19, weight: 560, align: "center", gradient: "deepBlue" }),
        ];
      }

      function installDemo({ x, y, w, h }) {
        return [
          panel({ x, y, w, h, border: "rgba(62,195,247,0.46)", fill: "rgba(62,195,247,0.045)" }),
          raw({
            x,
            y,
            w,
            h,
            className: "cli-install-demo",
            html: `
              <div class="cli-install" data-install-demo>
                <div class="cli-install-steps">
                  <button class="cli-install-step is-active" data-install-step="install">手动安装</button>
                  <button class="cli-install-step" data-install-step="agent">Agent 安装</button>
                  <button class="cli-install-step" data-install-step="auth">用户授权</button>
                  <button class="cli-install-step" data-install-step="doctor">检查安装</button>
                  <button class="cli-install-step" data-install-step="first">第一条任务</button>
                </div>
                <div class="cli-install-command" data-install-command>npx @larksuite/cli@latest install</div>
                <button class="cli-copy" data-copy-command>复制</button>
                <div class="cli-install-note" data-install-note>在终端执行官方安装命令，安装 CLI 并加载 Agent skills。安装完成后重启 Codex、Cursor 或 Claude Code。</div>
                <div class="cli-install-status" data-install-status>ready</div>
              </div>
            `,
          }),
        ];
      }

      const abilities = ["消息", "文档", "日历", "多维表格", "邮箱", "妙记", "任务", "审批", "..."];

      const deck = LarkSlides.createDeckSpec({
        title: "飞书 CLI 介绍",
        description: "基于飞书 CLI 能力介绍与最佳实践文档生成的 HTML 演示稿。",
        theme: "larkVisual",
        meta: {
          sourceDoc: "https://bytedance.larkoffice.com/docx/WnHkdJQM6oGpQFxm9i7ckVdenSh",
        },
        slides: [
          T.visualLayout({
            sourceSlide: "cli-1",
            title: "飞书 CLI",
            blocks: [
              ...bg(),
              text({ x: FRAME.x, y: 130, w: 860, h: 78, value: "飞书 CLI", size: 72, weight: 780, gradient: "brand" }),
              text({ x: FRAME.x, y: 230, w: 900, h: 164, value: "给每个 Agent\n一双操作飞书的手", size: 72, weight: 760, gradient: "soft", lineHeight: 1.08 }),
              text({ x: FRAME.x + 2, y: 440, w: 780, h: 78, value: "让 AI 不止会回答，还能直接读消息、查日历、写文档、建多维表格、发邮件。", size: 30, weight: 500, color: "#aeb7c7", lineHeight: 1.34, className: "cli-muted" }),
              ...installDemo({ x: FRAME.x, y: 560, w: 820, h: 244 }),
              panel({ x: 1002, y: 130, w: 406, h: 674, border: "rgba(62,195,247,0.38)", fill: "rgba(255,255,255,0.035)" }),
              text({ x: 1040, y: 168, w: 330, h: 36, value: "能力覆盖", size: 30, weight: 740, align: "center", gradient: "brand" }),
              text({ x: 1040, y: 214, w: 330, h: 58, value: "覆盖 17 个业务域、219 个命令接口，从协同内容到业务数据都能被 Agent 调用。", size: 19, weight: 480, align: "center", color: "#aeb7c7", lineHeight: 1.32, className: "cli-muted" }),
              ...metric({ x: 1042, y: 306, w: 142, value: "17", label: "业务域" }),
              ...metric({ x: 1214, y: 306, w: 142, value: "219", label: "命令接口" }),
              ...abilities.flatMap((label, index) => {
                const col = index % 3;
                const row = Math.floor(index / 3);
                return tag({ x: 1038 + col * 110, y: 470 + row * 58, w: 92, label, className: `cli-rise-${["a", "b", "c"][row % 3]}` });
              }),
              text({ x: 1040, y: 676, w: 330, h: 42, value: "更多能力通过 lark-cli help 和 schema 查询。", size: 18, weight: 480, align: "center", color: "#aeb7c7", lineHeight: 1.28, className: "cli-muted" }),
            ],
          }),
          T.visualLayout({
            sourceSlide: "cli-2",
            title: "CLI 是什么",
            blocks: [
              ...bg(),
              ...title({ title: "用户说目标，Agent 把它拆成飞书动作", subtitle: "CLI 的价值不是展示一条命令，而是让每一步执行都可验证、可继续、可写回。" }),
              ...(() => {
                const grid = C.layoutGrid({ x: FRAME.x, y: 286, w: FRAME.w, columns: 4, gap: 38 });
                const labels = [
                  { label: "用户目标", title: "一句自然语言", body: "帮我约下周项目复盘，把纪要模板建好，再通知项目群。" },
                  { label: "Agent 规划", title: "拆成动作计划", body: "先查忙闲，再建日程；随后创建文档模板，最后把链接发到群里。" },
                  { label: "CLI 执行", title: "按权限调用飞书", body: "每个动作对应明确命令；结果返回后继续下一步。", code: '<span class="muted">$</span> calendar +freebusy<br><span class="muted">$</span> docs +create<br><span class="muted">$</span> im messages-reply' },
                  { label: "飞书回写", title: "落到真实空间", body: "日程、文档、群消息都在飞书里生成，团队直接接着协作。" },
                ];
                return labels.flatMap((item, index) => {
                  const col = grid.col(index);
                  return [
                    ...stageCard({ x: col.x, y: grid.y, w: col.w, h: 284, label: item.label, title: item.title, body: item.body, code: item.code, className: `cli-rise-${["a", "b", "c", "d"][index]}` }),
                    ...(index < 3 ? [flowLine({ x: col.x + col.w + 12, y: 415, w: 14, id: `what-${index}` })] : []),
                  ];
                });
              })(),
              panel({ x: 238, y: 660, w: 1124, h: 86, border: "rgba(62,195,247,0.34)", fill: "rgba(62,195,247,0.045)" }),
              text({ x: 278, y: 684, w: 1044, h: 34, value: "你看到的是目标，Agent 看到的是一组可执行、可检查、可恢复的飞书操作。", size: 26, weight: 620, align: "center", gradient: "soft" }),
            ],
          }),
          T.visualLayout({
            sourceSlide: "cli-3",
            title: "使用案例",
            blocks: [
              ...bg(),
              ...title({ title: "案例：从妙记到待办，再同步到群", subtitle: "适合展示飞书 CLI 的地方，是把会议之后的执行链路跑完。" }),
              panel({ x: FRAME.x, y: 270, w: 1260, h: 128, border: "rgba(62,195,247,0.38)", fill: "rgba(62,195,247,0.045)" }),
              text({ x: 168, y: 298, w: 1164, h: 30, value: "你只说一句话", size: 23, weight: 720, align: "center", gradient: "brand" }),
              text({ x: 168, y: 340, w: 1164, h: 34, value: "读一下这个妙记，把里面的待办提取出来，帮我创建待办后发到群里", size: 30, weight: 650, align: "center", color: "#f7f8fb", className: "cli-wrap" }),
              ...(() => {
                const grid = C.layoutGrid({ x: FRAME.x, y: 486, w: FRAME.w, columns: 3, gap: 44 });
                const items = [
                  { title: "读妙记", body: "读取会议纪要、章节和 AI 总结，识别谁要做什么。", command: "lark-cli minutes +download" },
                  { title: "创建待办", body: "把识别出的事项转成飞书任务，带负责人、截止时间和原始链接。", command: "lark-cli task +create" },
                  { title: "发到群里", body: "把任务清单和链接同步到项目群，方便团队确认和跟进。", command: "lark-cli im messages-reply" },
                ];
                return items.flatMap((item, index) => {
                  const col = grid.col(index);
                  return [
                    ...miniStep({ x: col.x, y: grid.y, w: col.w, h: 218, title: item.title, body: item.body, command: item.command, className: `cli-rise-${["a", "b", "c"][index]}` }),
                    ...(index < 2 ? [flowLine({ x: col.x + col.w + 12, y: 586, w: 20, id: `case-${index}` })] : []),
                  ];
                });
              })(),
              text({ x: 180, y: 754, w: 1240, h: 34, value: "关键点：CLI 不替代 Agent 思考，它把 Agent 的计划变成真实飞书操作。", size: 25, weight: 560, align: "center", color: "#aeb7c7", className: "cli-muted" }),
            ],
          }),
        ],
      });

      const installSteps = {
        install: {
          command: "npx @larksuite/cli@latest install",
          note: "在终端执行官方安装命令，安装 CLI 并加载 Agent skills。安装完成后重启 Codex、Cursor 或 Claude Code。",
          status: "ready",
        },
        agent: {
          command: "帮我安装飞书 CLI：https://open.feishu.cn/document/no_class/mcp-archive/feishu-cli-installation-guide.md",
          note: "如果你希望 AI 工具代办安装，把这句话直接发给 Agent。Agent 会根据安装指南执行。",
          status: "agent prompt copied",
        },
        auth: {
          command: "lark-cli auth login",
          note: "需要访问你的日历、消息、文档、邮箱等个人数据时，执行用户授权。后续缺权限时也可以按提示补授权。",
          status: "identity: user",
        },
        doctor: {
          command: "lark-cli doctor",
          note: "安装和授权后，用 doctor 检查配置、认证和连通性。这个步骤最接近真实的安装验收。",
          status: "health check",
        },
        first: {
          command: "帮我创建一篇云文档，介绍飞书 CLI 的能力，以及我可以先用哪些能力",
          note: "最后回到自然语言。你给目标，Agent 选择 CLI 能力并执行，关键动作前让你确认。",
          status: "first task",
        },
      };

      function copyText(value) {
        if (navigator.clipboard && window.isSecureContext) return navigator.clipboard.writeText(value);
        const input = document.createElement("textarea");
        input.value = value;
        input.style.position = "fixed";
        input.style.opacity = "0";
        document.body.appendChild(input);
        input.select();
        document.execCommand("copy");
        input.remove();
        return Promise.resolve();
      }

      function bindInstallDemo() {
        document.querySelectorAll("[data-install-demo]").forEach((demo) => {
          const commandEl = demo.querySelector("[data-install-command]");
          const noteEl = demo.querySelector("[data-install-note]");
          const statusEl = demo.querySelector("[data-install-status]");
          const copyButton = demo.querySelector("[data-copy-command]");
          demo.querySelectorAll("[data-install-step]").forEach((button) => {
            button.addEventListener("click", () => {
              const step = installSteps[button.dataset.installStep] || installSteps.install;
              demo.querySelectorAll("[data-install-step]").forEach((item) => item.classList.toggle("is-active", item === button));
              commandEl.textContent = step.command;
              noteEl.textContent = step.note;
              statusEl.textContent = step.status;
              copyButton.textContent = "复制";
            });
          });
          copyButton.addEventListener("click", () => {
            copyButton.textContent = "已复制";
            copyText(commandEl.textContent).catch(() => {});
            setTimeout(() => {
              copyButton.textContent = "复制";
            }, 1400);
          });
        });
      }

      LarkSlides.createDeck({
        mount: "#deck",
        deck,
        controls: new URLSearchParams(location.search).get("controls") !== "0",
      });
      bindInstallDemo();
    </script>
  </body>
</html>

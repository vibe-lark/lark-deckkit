<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>飞书 CLI 介绍</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="../sdk/fonts.css" />
    <link rel="stylesheet" href="../sdk/lark-slides.css" />
    <style>
      .cli-muted span {
        color: #b5bac4 !important;
        -webkit-text-fill-color: #b5bac4 !important;
        white-space: normal !important;
      }

      .cli-muted,
      .cli-muted p,
      .cli-card p {
        white-space: normal !important;
      }

      .cli-code span,
      .cli-terminal,
      .cli-terminal * {
        font-family: "SFMono-Regular", Menlo, Consolas, monospace !important;
      }

      .cli-panel,
      .cli-card {
        backdrop-filter: blur(6px);
      }

      .cli-panel::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        border-radius: inherit;
        background: linear-gradient(90deg, transparent, rgba(62, 195, 247, 0.12), transparent);
        transform: translateX(-120%);
      }

      .ls-slide.is-active .cli-panel::after {
        animation: cli-shine 4.8s ease-in-out infinite;
      }

      .cli-proto-dot {
        background: radial-gradient(circle, #e2fff7 0%, #3ec3f7 42%, rgba(20, 86, 240, 0) 72%);
        border-radius: 999px;
        filter: drop-shadow(0 0 18px rgba(62, 195, 247, 0.45));
      }

      .ls-slide.is-active .cli-proto-dot {
        animation: cli-pulse 2.4s ease-in-out infinite;
      }

      .cli-flow path,
      .cli-flow line {
        stroke-dasharray: 18 16;
      }

      .ls-slide.is-active .cli-flow path,
      .ls-slide.is-active .cli-flow line {
        animation: cli-dash 2.3s linear infinite;
      }

      .cli-terminal {
        color: #f7f9ff;
        font-size: 22px;
        line-height: 1.62;
      }

      .cli-terminal .muted {
        color: #8e98a9;
      }

      .cli-terminal .ok {
        color: #69dca9;
      }

      .cli-terminal .typing {
        display: inline-block;
        width: 0;
        max-width: 100%;
        overflow: hidden;
        white-space: nowrap;
        vertical-align: bottom;
      }

      .ls-slide.is-active .cli-terminal .typing {
        animation: cli-type 3.6s steps(42, end) 0.45s forwards;
      }

      .cli-cursor {
        display: inline-block;
        width: 10px;
        height: 22px;
        margin-left: 5px;
        background: #3ec3f7;
        vertical-align: -4px;
      }

      .ls-slide.is-active .cli-cursor {
        animation: cli-blink 0.8s steps(2, start) infinite;
      }

      .ls-slide.is-active .cli-drift {
        animation: cli-drift 7s ease-in-out infinite;
      }

      .ls-slide.is-active .cli-step-a {
        animation: cli-rise 0.7s ease-out both;
      }

      .ls-slide.is-active .cli-step-b {
        animation: cli-rise 0.7s ease-out 0.16s both;
      }

      .ls-slide.is-active .cli-step-c {
        animation: cli-rise 0.7s ease-out 0.32s both;
      }

      @keyframes cli-shine {
        0%, 42% { transform: translateX(-120%); }
        72%, 100% { transform: translateX(120%); }
      }

      @keyframes cli-pulse {
        0%, 100% { transform: scale(0.92); opacity: 0.62; }
        50% { transform: scale(1.14); opacity: 1; }
      }

      @keyframes cli-dash {
        to { stroke-dashoffset: -68; }
      }

      @keyframes cli-type {
        from { width: 0; }
        to { width: 700px; }
      }

      @keyframes cli-blink {
        50% { opacity: 0; }
      }

      @keyframes cli-drift {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-12px); }
      }

      @keyframes cli-rise {
        from { opacity: 0; transform: translateY(18px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @media (prefers-reduced-motion: reduce) {
        .cli-panel::after,
        .cli-proto-dot,
        .cli-flow path,
        .cli-flow line,
        .cli-terminal .typing,
        .cli-cursor,
        .cli-drift,
        .cli-step-a,
        .cli-step-b,
        .cli-step-c {
          animation: none !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="deck" data-lark-deck data-lark-cli-intro></div>
    <script src="../sdk/lark-slides.js"></script>
    <script src="../sdk/templates.js"></script>
    <script>
      const A = (name) => `assets/pptx-media/${name}`;
      const T = LarkSlideTemplates;
      const C = T.components;

      function bg() {
        return [
          C.imageBlock({ src: A("e2cc3c0d5dc3155d.png") }),
          C.imageBlock({ src: A("b4906f8983e9cecf.png"), x: 34, y: -900, w: 1532, h: 1800 }),
          C.imageBlock({ src: A("fe0be4b4d6325923.png") }),
        ];
      }

      function text({ x, y, w, h, value, size = 38, weight = 650, color = "#f7f8fb", align = "left", gradient = "", className = "", lineHeight = 1.16 }) {
        return C.textBlock({ x, y, w, h, text: value, size, weight, color, align, gradient, className, lineHeight });
      }

      function htmlText({ x, y, w, h, html, className = "" }) {
        return { kind: "text", className, style: `left:${x}px;top:${y}px;width:${w}px;height:${h}px;background:transparent;`, html };
      }

      function panel({ x, y, w, h, border = "rgba(255,255,255,0.18)", fill = "rgba(255,255,255,0.055)", className = "" }) {
        return C.shapeBlock({
          x,
          y,
          w,
          h,
          fill,
          radius: "8px",
          border: `1.2px solid ${border}`,
          className: `cli-panel ${className}`.trim(),
        });
      }

      function pill({ x, y, w, label, tone = "default", className = "" }) {
        const border = tone === "brand" ? "rgba(62,195,247,0.58)" : "rgba(255,255,255,0.24)";
        const gradient = tone === "brand" ? "deepBlue" : "";
        return [
          C.shapeBlock({ x, y, w, h: 46, fill: "rgba(255,255,255,0.035)", radius: "6px", border: `1.2px solid ${border}`, className }),
          text({ x, y: y + 7, w, h: 32, value: label, size: 21, weight: 620, align: "center", color: "#d8dee8", gradient }),
        ];
      }

      function flow({ x, y, w, h = 24, id = "flow", reverse = false }) {
        const x1 = reverse ? w : 0;
        const x2 = reverse ? 0 : w;
        return C.vectorBlock({
          x,
          y,
          w,
          h,
          className: "cli-flow",
          html: `<svg viewBox="0 0 ${w} ${h}" width="100%" height="100%" preserveAspectRatio="none"><line x1="${x1}" y1="${h / 2}" x2="${x2}" y2="${h / 2}" stroke="url(#${id})" stroke-width="4" stroke-linecap="round"/><defs><linearGradient id="${id}" x1="0" x2="1"><stop offset="0" stop-color="#ceeafe"/><stop offset="0.55" stop-color="#3ec3f7"/><stop offset="1" stop-color="#1456f0"/></linearGradient></defs></svg>`,
        });
      }

      function node({ x, y, w = 218, h = 88, label, caption, tone = "default", className = "" }) {
        const brand = tone === "brand";
        return [
          panel({ x, y, w, h, border: brand ? "rgba(62,195,247,0.52)" : "rgba(255,255,255,0.18)", fill: brand ? "rgba(62,195,247,0.07)" : "rgba(255,255,255,0.045)", className }),
          text({ x: x + 22, y: y + 17, w: w - 44, h: 30, value: label, size: 25, weight: 720, align: "center", gradient: brand ? "brand" : "", color: "#f7f8fb" }),
          text({ x: x + 22, y: y + 54, w: w - 44, h: 22, value: caption, size: 17, weight: 480, align: "center", color: "#9ea8b8", className: "cli-muted" }),
        ];
      }

      function card({ x, y, w, h, title, body, index, className = "" }) {
        return [
          panel({ x, y, w, h, className: `cli-card ${className}`.trim() }),
          text({ x: x + 28, y: y + 24, w: 54, h: 36, value: index, size: 22, weight: 760, gradient: "deepBlue" }),
          text({ x: x + 82, y: y + 21, w: w - 112, h: 38, value: title, size: 28, weight: 740, gradient: "brand" }),
          text({ x: x + 28, y: y + 78, w: w - 56, h: h - 96, value: body, size: 22, weight: 480, color: "#b5bac4", lineHeight: 1.38, className: "cli-muted" }),
        ];
      }

      function terminal({ x, y, w, h, command, lines = [] }) {
        return [
          C.shapeBlock({ x, y, w, h, fill: "rgba(4,11,25,0.74)", radius: "8px", border: "1.2px solid rgba(255,255,255,0.18)", className: "cli-panel" }),
          htmlText({
            x: x + 30,
            y: y + 26,
            w: w - 60,
            h: h - 52,
            className: "cli-terminal",
            html: `<div class="cli-terminal"><div><span class="muted">$</span> <span class="typing">${command}</span><span class="cli-cursor"></span></div>${lines.map((line) => `<div>${line}</div>`).join("")}</div>`,
          }),
        ];
      }

      const deck = LarkSlides.createDeckSpec({
        title: "飞书 CLI 介绍",
        description: "基于飞书 CLI 能力介绍与最佳实践文档生成的 5 页以内 HTML 演示稿，突出 HTML 做 PPT 的可编辑、可动效和可发布优势。",
        theme: "larkVisual",
        meta: {
          sourceDoc: "https://bytedance.larkoffice.com/docx/WnHkdJQM6oGpQFxm9i7ckVdenSh",
        },
        slides: [
          T.visualLayout({
            sourceSlide: "cli-1",
            title: "飞书 CLI",
            blocks: [
              ...bg(),
              C.shapeBlock({ x: 1180, y: 90, w: 260, h: 46, fill: "rgba(62,195,247,0.07)", radius: "6px", border: "1.2px solid rgba(62,195,247,0.5)" }),
              text({ x: 1180, y: 100, w: 260, h: 28, value: "HTML PPT Prototype", size: 21, weight: 700, align: "center", gradient: "deepBlue" }),
              text({ x: 120, y: 154, w: 1080, h: 82, value: "飞书 CLI", size: 72, weight: 780, gradient: "brand" }),
              text({ x: 120, y: 250, w: 1010, h: 174, value: "给每个 Agent\n一双操作飞书的手", size: 76, weight: 760, gradient: "soft", lineHeight: 1.08 }),
              text({ x: 124, y: 474, w: 875, h: 76, value: "让 AI 不止会回答，还能直接读消息、查日历、写文档、建多维表格、发邮件。", size: 30, weight: 500, color: "#d9dee8", lineHeight: 1.34, className: "cli-muted" }),
              ...terminal({ x: 122, y: 620, w: 784, h: 118, command: "npx @larksuite/cli@latest install", lines: ['<span class="ok">done</span> skills loaded for Codex / Claude Code / Cursor'] }),
              C.shapeBlock({ x: 1078, y: 330, w: 18, h: 18, fill: "#3ec3f7", className: "cli-proto-dot" }),
              C.shapeBlock({ x: 1306, y: 446, w: 18, h: 18, fill: "#3ec3f7", className: "cli-proto-dot", style: "animation-delay:.6s;" }),
              ...node({ x: 1010, y: 210, label: "消息", caption: "群聊 / 私信", className: "cli-drift" }),
              ...node({ x: 1248, y: 286, label: "日历", caption: "忙闲 / 邀约", className: "cli-drift", tone: "brand" }),
              ...node({ x: 990, y: 420, label: "文档", caption: "创建 / 评论", className: "cli-drift" }),
              ...node({ x: 1238, y: 530, label: "多维表格", caption: "记录 / 看板", className: "cli-drift", tone: "brand" }),
              flow({ x: 1138, y: 374, w: 138, id: "cover-flow-a" }),
              flow({ x: 1144, y: 514, w: 108, id: "cover-flow-b" }),
              text({ x: 1008, y: 704, w: 500, h: 36, value: "这份稿不是截图播放壳：文字、图形、动效都在 DOM 里。", size: 23, weight: 520, align: "center", color: "#b5bac4", className: "cli-muted" }),
            ],
          }),
          T.visualLayout({
            sourceSlide: "cli-2",
            title: "CLI 是什么",
            blocks: [
              ...bg(),
              text({ x: 120, y: 96, w: 980, h: 66, value: "一句话理解：把飞书加入 AI 工作流", size: 54, weight: 760, gradient: "brand" }),
              text({ x: 124, y: 174, w: 760, h: 42, value: "你用自然语言说目标，Agent 用 CLI 读取 context 并执行动作。", size: 27, weight: 500, color: "#b5bac4", className: "cli-muted" }),
              ...node({ x: 126, y: 332, w: 260, h: 112, label: "你", caption: "说清目标" }),
              flow({ x: 408, y: 382, w: 196, id: "what-flow-a" }),
              ...node({ x: 626, y: 292, w: 348, h: 192, label: "AI Agent", caption: "规划任务 / 调命令 / 处理权限", tone: "brand", className: "cli-step-a" }),
              flow({ x: 998, y: 382, w: 196, id: "what-flow-b" }),
              ...node({ x: 1216, y: 332, w: 260, h: 112, label: "飞书", caption: "返回结果并写回" }),
              ...pill({ x: 226, y: 552, w: 190, label: "看日历" }),
              ...pill({ x: 450, y: 552, w: 190, label: "读群聊", tone: "brand" }),
              ...pill({ x: 674, y: 552, w: 190, label: "写文档" }),
              ...pill({ x: 898, y: 552, w: 190, label: "建 Base", tone: "brand" }),
              ...pill({ x: 1122, y: 552, w: 190, label: "发邮件" }),
              C.shapeBlock({ x: 232, y: 688, w: 1136, h: 72, fill: "rgba(62,195,247,0.06)", radius: "8px", border: "1.2px solid rgba(62,195,247,0.42)", className: "cli-panel" }),
              text({ x: 270, y: 709, w: 1060, h: 32, value: "核心变化：以前 AI 只能建议你做什么，现在 AI 可以带着授权直接把事做完。", size: 26, weight: 640, align: "center", gradient: "deepBlue" }),
            ],
          }),
          T.visualLayout({
            sourceSlide: "cli-3",
            title: "快速开始",
            blocks: [
              ...bg(),
              text({ x: 120, y: 96, w: 920, h: 66, value: "三分钟跑通第一条任务", size: 54, weight: 760, gradient: "brand" }),
              text({ x: 124, y: 174, w: 870, h: 42, value: "命令只是安装入口。真正的交互入口是你给 Agent 的一句话。", size: 27, weight: 500, color: "#b5bac4", className: "cli-muted" }),
              ...terminal({
                x: 120,
                y: 260,
                w: 700,
                h: 330,
                command: "lark-cli auth login",
                lines: [
                  '<span class="muted">open browser for user authorization</span>',
                  '<span class="ok">identity: user</span>',
                  '<span class="ok">calendar, docs, drive scopes ready</span>',
                  '<span class="muted">$</span> lark-cli help',
                ],
              }),
              ...card({ x: 880, y: 260, w: 460, h: 118, index: "01", title: "安装", body: "npx @larksuite/cli@latest install", className: "cli-step-a" }),
              ...card({ x: 880, y: 418, w: 460, h: 118, index: "02", title: "授权", body: "需要个人数据时执行 lark-cli auth login，后续权限可按需补齐。", className: "cli-step-b" }),
              ...card({ x: 880, y: 576, w: 460, h: 118, index: "03", title: "开工", body: "重启 Agent 后直接说目标，不需要背命令。", className: "cli-step-c" }),
              C.shapeBlock({ x: 158, y: 688, w: 1236, h: 74, fill: "rgba(255,255,255,0.055)", radius: "8px", border: "1.2px solid rgba(255,255,255,0.18)", className: "cli-panel" }),
              text({ x: 196, y: 709, w: 1160, h: 32, value: "示例：帮我创建一篇云文档，介绍飞书 CLI 的能力，以及我可以先用哪些能力。", size: 25, weight: 620, color: "#f7f9ff", align: "center", className: "cli-code" }),
            ],
          }),
          T.visualLayout({
            sourceSlide: "cli-4",
            title: "工作流原型",
            blocks: [
              ...bg(),
              text({ x: 120, y: 92, w: 980, h: 66, value: "把文档里的能力变成可演示原型", size: 54, weight: 760, gradient: "brand" }),
              text({ x: 124, y: 170, w: 890, h: 42, value: "HTML 做 PPT 的优势是：流程线可以动、状态可以跳、真实命令和素材可以持续替换。", size: 27, weight: 500, color: "#b5bac4", className: "cli-muted" }),
              ...card({ x: 120, y: 264, w: 370, h: 168, index: "A", title: "会议之后", body: "妙记 -> 待办识别 -> 发文档 / 建日程 / 写 Base", className: "cli-step-a" }),
              flow({ x: 516, y: 338, w: 184, id: "proto-flow-a" }),
              ...card({ x: 730, y: 264, w: 370, h: 168, index: "B", title: "文档协作", body: "初稿 -> 评论读取 -> 修订正文 -> 标记修改点", className: "cli-step-b" }),
              flow({ x: 1126, y: 338, w: 184, id: "proto-flow-b" }),
              ...card({ x: 1230, y: 264, w: 250, h: 168, index: "C", title: "邮件处理", body: "摘要 / 分级 / 草稿回复", className: "cli-step-c" }),
              C.vectorBlock({
                x: 220,
                y: 510,
                w: 1160,
                h: 136,
                className: "cli-flow",
                html: '<svg viewBox="0 0 1160 136" width="100%" height="100%" preserveAspectRatio="none"><path d="M0 118 C220 12, 420 12, 580 72 S940 148, 1160 24" fill="none" stroke="url(#proto-curve)" stroke-width="4" stroke-linecap="round"/><defs><linearGradient id="proto-curve" x1="0" x2="1"><stop offset="0" stop-color="#ceeafe"/><stop offset="0.55" stop-color="#3ec3f7"/><stop offset="1" stop-color="#1456f0"/></linearGradient></defs></svg>',
              }),
              C.shapeBlock({ x: 304, y: 602, w: 18, h: 18, fill: "#3ec3f7", className: "cli-proto-dot" }),
              C.shapeBlock({ x: 758, y: 574, w: 18, h: 18, fill: "#3ec3f7", className: "cli-proto-dot" }),
              C.shapeBlock({ x: 1264, y: 530, w: 18, h: 18, fill: "#3ec3f7", className: "cli-proto-dot" }),
              ...pill({ x: 266, y: 676, w: 196, label: "可交互动效", tone: "brand" }),
              ...pill({ x: 516, y: 676, w: 196, label: "可替换文案" }),
              ...pill({ x: 766, y: 676, w: 196, label: "可接真实数据", tone: "brand" }),
              ...pill({ x: 1016, y: 676, w: 196, label: "可直接上线" }),
            ],
          }),
          T.visualLayout({
            sourceSlide: "cli-5",
            title: "HTML 做 PPT 的优势",
            blocks: [
              ...bg(),
              text({ x: 120, y: 94, w: 1120, h: 70, value: "为什么用 HTML 做 PPT 讲飞书 CLI", size: 54, weight: 760, gradient: "brand" }),
              text({ x: 124, y: 176, w: 930, h: 42, value: "CLI 是面向 Agent 的执行层，HTML 幻灯片则是面向用户的可演示、可复用、可发布表达层。", size: 27, weight: 500, color: "#b5bac4", className: "cli-muted" }),
              ...card({ x: 120, y: 288, w: 360, h: 172, index: "01", title: "可编辑", body: "文字、标签、连线、图形都是 DOM，不再被锁在整页截图里。", className: "cli-step-a" }),
              ...card({ x: 520, y: 288, w: 360, h: 172, index: "02", title: "可动效", body: "终端输入、状态流转、流程连线可以直接成为原型演示。", className: "cli-step-b" }),
              ...card({ x: 920, y: 288, w: 360, h: 172, index: "03", title: "可发布", body: "素材和字体上 CDN，一个 URL 就能预览，不要求观众下载文件。", className: "cli-step-c" }),
              ...terminal({
                x: 152,
                y: 540,
                w: 1040,
                h: 156,
                command: "deck = LarkSlides.createDeckSpec({ source: doc, theme: 'larkVisual' })",
                lines: [
                  '<span class="ok">editable text</span> + <span class="ok">motion prototype</span> + <span class="ok">Magic Pages URL</span>',
                ],
              }),
              C.shapeBlock({ x: 1230, y: 552, w: 120, h: 120, fill: "rgba(62,195,247,0.08)", radius: "8px", border: "1.2px solid rgba(62,195,247,0.42)", className: "cli-panel cli-drift" }),
              text({ x: 1238, y: 582, w: 104, h: 32, value: "SDK", size: 29, weight: 760, align: "center", gradient: "deepBlue" }),
              text({ x: 1238, y: 626, w: 104, h: 28, value: "模板化复用", size: 18, weight: 500, align: "center", color: "#b5bac4", className: "cli-muted" }),
              text({ x: 154, y: 748, w: 1240, h: 34, value: "GitHub：github.com/larksuite/cli    帮助：lark-cli help    更新：lark-cli update", size: 25, weight: 650, align: "center", gradient: "deepBlue", className: "cli-code" }),
            ],
          }),
        ],
      });

      LarkSlides.createDeck({
        mount: "#deck",
        deck,
        controls: new URLSearchParams(location.search).get("controls") !== "0",
      });
    </script>
  </body>
</html>

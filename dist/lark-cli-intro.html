<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>飞书 CLI 介绍</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="../sdk/fonts.css" />
    <link rel="stylesheet" href="../sdk/lark-slides.css" />
    <style>
      .cli-code span,
      .cli-command span {
        font-family: "SFMono-Regular", Menlo, Consolas, monospace !important;
      }

      .cli-card p,
      .cli-pill p {
        line-height: 1.18;
      }

      .cli-muted span {
        color: #b5bac4 !important;
        -webkit-text-fill-color: #b5bac4 !important;
        white-space: normal !important;
      }

      .cli-muted,
      .cli-muted p {
        white-space: normal !important;
        overflow: hidden;
      }

      .cli-grid-label span {
        color: #d8dee8 !important;
        -webkit-text-fill-color: #d8dee8 !important;
      }
    </style>
  </head>
  <body>
    <div id="deck" data-lark-deck data-lark-cli-intro></div>
    <script src="../sdk/lark-slides.js"></script>
    <script src="../sdk/templates.js"></script>
    <script>
      const A = (name) => `assets/pptx-media/${name}`;
      const T = LarkSlideTemplates;
      const C = T.components;

      function bg() {
        return [
          C.imageBlock({ src: A("e2cc3c0d5dc3155d.png") }),
          C.imageBlock({ src: A("b4906f8983e9cecf.png"), x: 34, y: -900, w: 1532, h: 1800 }),
          C.imageBlock({ src: A("fe0be4b4d6325923.png") }),
        ];
      }

      function text({ x, y, w, h, value, size = 40, weight = 650, color = "#f7f8fb", align = "left", gradient = "", className = "", lineHeight = 1.18 }) {
        return C.textBlock({ x, y, w, h, text: value, size, weight, color, align, gradient, className, lineHeight });
      }

      function htmlText({ x, y, w, h, html, className = "" }) {
        return { kind: "text", className, style: `left:${x}px;top:${y}px;width:${w}px;height:${h}px;background:transparent;`, html };
      }

      function panel({ x, y, w, h, border = "rgba(255,255,255,0.18)", fill = "rgba(255,255,255,0.055)" }) {
        return C.shapeBlock({
          x,
          y,
          w,
          h,
          fill,
          radius: "8px",
          border: `1.2px solid ${border}`,
          style: "backdrop-filter:blur(4px);",
        });
      }

      function pill({ x, y, w, label, tone = "brand" }) {
        const border = tone === "brand" ? "rgba(62,195,247,0.56)" : "rgba(255,255,255,0.24)";
        return [
          C.shapeBlock({ x, y, w, h: 48, fill: "rgba(255,255,255,0.035)", radius: "6px", border: `1.2px solid ${border}` }),
          text({ x, y: y + 6, w, h: 36, value: label, size: 22, weight: 560, align: "center", color: "#d8dee8", className: "cli-pill" }),
        ];
      }

      function line({ x1, y1, x2, y2, dashed = true }) {
        const dash = dashed ? 'stroke-dasharray="16 18"' : "";
        return C.vectorBlock({
          x: Math.min(x1, x2),
          y: Math.min(y1, y2) - 8,
          w: Math.abs(x2 - x1),
          h: 16,
          html: `<svg viewBox="0 0 ${Math.abs(x2 - x1)} 16" width="100%" height="100%" preserveAspectRatio="none"><line x1="0" y1="8" x2="${Math.abs(x2 - x1)}" y2="8" stroke="url(#g)" stroke-width="3" stroke-linecap="round" ${dash}/><defs><linearGradient id="g" x1="0" x2="1"><stop offset="0" stop-color="#ceeafe"/><stop offset="0.55" stop-color="#3ec3f7"/><stop offset="1" stop-color="#1456f0"/></linearGradient></defs></svg>`,
        });
      }

      function card({ x, y, w, h, title, body, index }) {
        return [
          panel({ x, y, w, h }),
          text({ x: x + 30, y: y + 28, w: 58, h: 40, value: index, size: 22, weight: 700, gradient: "deepBlue" }),
          text({ x: x + 88, y: y + 24, w: w - 118, h: 44, value: title, size: 30, weight: 740, gradient: "brand" }),
          text({ x: x + 30, y: y + 82, w: w - 60, h: h - 106, value: body, size: 23, weight: 480, color: "#b5bac4", lineHeight: 1.42, className: "cli-muted" }),
        ];
      }

      const deck = LarkSlides.createDeckSpec({
        title: "飞书 CLI 介绍",
        description: "基于飞书 CLI 能力介绍与最佳实践文档生成的 5 页以内 HTML 演示稿。",
        theme: "larkVisual",
        meta: {
          sourceDoc: "https://bytedance.larkoffice.com/docx/WnHkdJQM6oGpQFxm9i7ckVdenSh",
        },
        slides: [
          T.visualLayout({
            sourceSlide: "cli-1",
            title: "飞书 CLI",
            blocks: [
              ...bg(),
              C.shapeBlock({ x: 120, y: 108, w: 184, h: 48, fill: "rgba(62,195,247,0.08)", radius: "6px", border: "1.2px solid rgba(62,195,247,0.44)" }),
              text({ x: 120, y: 118, w: 184, h: 32, value: "Lark CLI", size: 22, weight: 700, align: "center", gradient: "deepBlue" }),
              text({ x: 120, y: 266, w: 1100, h: 172, value: "给每个 Agent\n一双操作飞书的手", size: 78, weight: 760, gradient: "brand", lineHeight: 1.08 }),
              text({ x: 124, y: 486, w: 930, h: 84, value: "让 AI 不止会回答，还能直接读消息、查日历、写文档、建表格、发邮件。", size: 32, weight: 500, color: "#d9dee8", lineHeight: 1.34, className: "cli-muted" }),
              C.shapeBlock({ x: 122, y: 642, w: 710, h: 76, fill: "rgba(255,255,255,0.06)", radius: "8px", border: "1.2px solid rgba(255,255,255,0.18)" }),
              text({ x: 154, y: 666, w: 646, h: 34, value: "npx @larksuite/cli@latest install", size: 28, weight: 650, color: "#f7f9ff", className: "cli-command" }),
              text({ x: 1062, y: 626, w: 310, h: 34, value: "Open Source", size: 26, weight: 700, align: "center", gradient: "deepBlue" }),
              text({ x: 970, y: 676, w: 500, h: 80, value: "无需登记、无需审核，Claude Code / Codex / Cursor 都可接入", size: 24, weight: 480, color: "#b5bac4", align: "center", className: "cli-muted" }),
            ],
          }),
          T.visualLayout({
            sourceSlide: "cli-2",
            title: "CLI 是什么",
            blocks: [
              ...bg(),
              text({ x: 120, y: 112, w: 900, h: 64, value: "CLI 不是给你学命令", size: 52, weight: 760, gradient: "brand" }),
              text({ x: 122, y: 184, w: 820, h: 44, value: "它是让 AI 直接和飞书对话的通道", size: 28, weight: 500, color: "#b5bac4", className: "cli-muted" }),
              panel({ x: 145, y: 360, w: 300, h: 164 }),
              panel({ x: 650, y: 320, w: 300, h: 244, border: "rgba(62,195,247,0.48)", fill: "rgba(62,195,247,0.07)" }),
              panel({ x: 1155, y: 360, w: 300, h: 164 }),
              ...pill({ x: 190, y: 312, w: 210, label: "你" }),
              ...pill({ x: 695, y: 272, w: 210, label: "AI Agent", tone: "brand" }),
              ...pill({ x: 1200, y: 312, w: 210, label: "飞书" }),
              text({ x: 188, y: 402, w: 214, h: 58, value: "用自然语言\n说清楚目标", size: 28, weight: 620, align: "center", color: "#f7f8fb", lineHeight: 1.18 }),
              text({ x: 688, y: 368, w: 224, h: 88, value: "调用 CLI\n读取 context\n执行动作", size: 30, weight: 740, align: "center", gradient: "brand", lineHeight: 1.16 }),
              text({ x: 1190, y: 402, w: 230, h: 58, value: "返回结果\n写回业务系统", size: 28, weight: 620, align: "center", color: "#f7f8fb", lineHeight: 1.18 }),
              line({ x1: 458, y1: 442, x2: 632, y2: 442 }),
              line({ x1: 968, y1: 442, x2: 1142, y2: 442 }),
              text({ x: 282, y: 640, w: 1036, h: 72, value: "以前是你操作飞书；现在是 AI 操作飞书，你只管拍板。", size: 44, weight: 740, align: "center", gradient: "soft" }),
            ],
          }),
          T.visualLayout({
            sourceSlide: "cli-3",
            title: "快速开始",
            blocks: [
              ...bg(),
              text({ x: 120, y: 102, w: 900, h: 64, value: "三步开始第一件事", size: 54, weight: 760, gradient: "brand" }),
              ...card({ x: 120, y: 236, w: 410, h: 230, index: "01", title: "安装", body: "终端执行一行命令，或直接让 Codex / Cursor / Claude Code 帮你安装。"}),
              ...card({ x: 595, y: 236, w: 410, h: 230, index: "02", title: "授权", body: "需要个人数据时执行 lark-cli auth login，让 AI 能以你的身份读取日历、消息和文档。"}),
              ...card({ x: 1070, y: 236, w: 410, h: 230, index: "03", title: "重启 Agent", body: "配置完成后重启 AI 工具，确保 skills 和命令能力完整加载。"}),
              C.shapeBlock({ x: 178, y: 572, w: 1244, h: 118, fill: "rgba(255,255,255,0.06)", radius: "8px", border: "1.2px solid rgba(255,255,255,0.18)" }),
              text({ x: 220, y: 604, w: 1160, h: 34, value: "帮我创建一篇云文档，介绍飞书 CLI 的能力有哪些，以及基于你对我的了解，我可以先开始用哪些能力", size: 27, weight: 600, color: "#f7f9ff", className: "cli-code" }),
              text({ x: 178, y: 724, w: 1244, h: 40, value: "你不需要记命令。把目标说给 AI，AI 会自己选择 CLI 能力并处理权限提示。", size: 28, weight: 500, color: "#b5bac4", align: "center", className: "cli-muted" }),
            ],
          }),
          T.visualLayout({
            sourceSlide: "cli-4",
            title: "能做什么",
            blocks: [
              ...bg(),
              text({ x: 120, y: 96, w: 980, h: 66, value: "从聊天到执行，飞书进入 AI 工作流", size: 52, weight: 760, gradient: "brand" }),
              text({ x: 124, y: 174, w: 820, h: 40, value: "典型价值不是“查一下”，而是把信息读取、判断、写回串成闭环。", size: 27, weight: 500, color: "#b5bac4", className: "cli-muted" }),
              ...card({ x: 120, y: 280, w: 430, h: 198, index: "A", title: "会议后待办自动执行", body: "从妙记里识别要发文档、约 follow-up、找链接等动作，执行前给你确认。"}),
              ...card({ x: 585, y: 280, w: 430, h: 198, index: "B", title: "人与 AI 共创文档", body: "AI 创建初稿、读评论、改正文；也能作为审稿人直接在文档里提评论。"}),
              ...card({ x: 1050, y: 280, w: 430, h: 198, index: "C", title: "跨时区智能约会", body: "拉群成员、查忙闲、考虑时区，推荐共同合适时间并创建日程。"}),
              ...card({ x: 355, y: 530, w: 430, h: 198, index: "D", title: "会议审计到仪表盘", body: "拉取日历和妙记，自动分类、打分，写入多维表格形成看板。"}),
              ...card({ x: 815, y: 530, w: 430, h: 198, index: "E", title: "未读邮件智能处理", body: "扫描未读邮件、分类摘要、起草回复，把重要邮件推送到群。"}),
            ],
          }),
          T.visualLayout({
            sourceSlide: "cli-5",
            title: "为什么选择飞书 CLI",
            blocks: [
              ...bg(),
              text({ x: 120, y: 104, w: 1060, h: 76, value: "企业 Agent 缺的不是模型，而是 context 和手", size: 54, weight: 760, gradient: "brand" }),
              text({ x: 124, y: 184, w: 860, h: 76, value: "飞书 CLI 同时解决“知道工作上下文”和“能直接执行动作”两个问题。", size: 28, weight: 500, color: "#b5bac4", className: "cli-muted" }),
              ...card({ x: 120, y: 312, w: 390, h: 238, index: "01", title: "为 AI 设计", body: "错误会告诉 AI 怎么修；缺权限会引导补授权；命令输出对 token 更友好。"}),
              ...card({ x: 550, y: 312, w: 390, h: 238, index: "02", title: "两种身份", body: "支持应用身份和用户身份，既能做企业集成，也能代表个人完成工作。"}),
              ...card({ x: 980, y: 312, w: 390, h: 238, index: "03", title: "覆盖核心域", body: "消息、文档、表格、多维表格、日历、会议、邮箱、任务、知识库、通讯录等。"}),
              C.shapeBlock({ x: 190, y: 660, w: 1220, h: 74, fill: "rgba(62,195,247,0.07)", radius: "8px", border: "1.2px solid rgba(62,195,247,0.44)" }),
              text({ x: 230, y: 682, w: 1140, h: 34, value: "GitHub：github.com/larksuite/cli    更新：lark-cli update    帮助：lark-cli help", size: 26, weight: 650, align: "center", gradient: "deepBlue", className: "cli-grid-label" }),
            ],
          }),
        ],
      });

      LarkSlides.createDeck({
        mount: "#deck",
        deck,
        controls: new URLSearchParams(location.search).get("controls") !== "0",
      });
    </script>
  </body>
</html>

<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>飞书 CLI 介绍</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="../sdk/fonts.css" />
    <link rel="stylesheet" href="../sdk/lark-slides.css" />
    <style>
      .cli-muted span,
      .cli-muted p {
        color: #aeb7c7 !important;
        -webkit-text-fill-color: #aeb7c7 !important;
        white-space: normal !important;
      }

      .cli-label span {
        color: #d8dee8 !important;
        -webkit-text-fill-color: #d8dee8 !important;
      }

      .cli-code span,
      .cli-terminal,
      .cli-terminal * {
        font-family: "SFMono-Regular", Menlo, Consolas, monospace !important;
      }

      .cli-code,
      .cli-code p,
      .cli-code span {
        white-space: normal !important;
        overflow-wrap: anywhere;
      }

      .cli-terminal {
        color: #f7f9ff;
        font-size: 24px;
        line-height: 1.52;
      }

      .cli-terminal .muted {
        color: #8590a3;
      }

      .cli-terminal .ok {
        color: #62d99c;
      }

      .cli-cursor {
        display: inline-block;
        width: 9px;
        height: 24px;
        margin-left: 5px;
        background: #3ec3f7;
        vertical-align: -4px;
      }

      .ls-slide.is-active .cli-cursor {
        animation: cli-blink 0.9s steps(2, start) infinite;
      }

      .cli-flow line,
      .cli-flow path {
        stroke-dasharray: 18 16;
      }

      .ls-slide.is-active .cli-flow line,
      .ls-slide.is-active .cli-flow path {
        animation: cli-dash 2.6s linear infinite;
      }

      .cli-dot {
        background: radial-gradient(circle, #e2fff7 0%, #3ec3f7 48%, rgba(20, 86, 240, 0) 74%);
        border-radius: 999px;
        filter: drop-shadow(0 0 16px rgba(62, 195, 247, 0.42));
      }

      .ls-slide.is-active .cli-dot {
        animation: cli-pulse 2.1s ease-in-out infinite;
      }

      .ls-slide.is-active .cli-rise-a {
        animation: cli-rise 0.55s ease-out both;
      }

      .ls-slide.is-active .cli-rise-b {
        animation: cli-rise 0.55s ease-out 0.12s both;
      }

      .ls-slide.is-active .cli-rise-c {
        animation: cli-rise 0.55s ease-out 0.24s both;
      }

      .ls-slide.is-active .cli-rise-d {
        animation: cli-rise 0.55s ease-out 0.36s both;
      }

      @keyframes cli-blink {
        50% { opacity: 0; }
      }

      @keyframes cli-dash {
        to { stroke-dashoffset: -68; }
      }

      @keyframes cli-pulse {
        0%, 100% { transform: scale(0.92); opacity: 0.72; }
        50% { transform: scale(1.12); opacity: 1; }
      }

      @keyframes cli-rise {
        from { opacity: 0; transform: translateY(14px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @media (prefers-reduced-motion: reduce) {
        .cli-cursor,
        .cli-flow line,
        .cli-flow path,
        .cli-dot,
        .cli-rise-a,
        .cli-rise-b,
        .cli-rise-c,
        .cli-rise-d {
          animation: none !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="deck" data-lark-deck data-lark-cli-intro></div>
    <script src="../sdk/lark-slides.js"></script>
    <script src="../sdk/templates.js"></script>
    <script>
      const A = (name) => `assets/pptx-media/${name}`;
      const T = LarkSlideTemplates;
      const C = T.components;
      const FRAME = { x: 120, w: 1360 };

      function bg() {
        return [
          C.imageBlock({ src: A("e2cc3c0d5dc3155d.png") }),
          C.imageBlock({ src: A("b4906f8983e9cecf.png"), x: 34, y: -900, w: 1532, h: 1800 }),
          C.imageBlock({ src: A("fe0be4b4d6325923.png") }),
        ];
      }

      function text({ x, y, w, h, value, size = 34, weight = 620, color = "#f7f8fb", align = "left", gradient = "", className = "", lineHeight = 1.18 }) {
        return C.textBlock({ x, y, w, h, text: value, size, weight, color, align, gradient, className, lineHeight });
      }

      function htmlText({ x, y, w, h, html, className = "" }) {
        return { kind: "text", className, style: `left:${x}px;top:${y}px;width:${w}px;height:${h}px;background:transparent;`, html };
      }

      function title({ title, subtitle, y = 92, w = 1120 }) {
        return [
          text({ x: FRAME.x, y, w, h: 68, value: title, size: 54, weight: 760, gradient: "brand" }),
          text({ x: FRAME.x + 2, y: y + 78, w: Math.min(w, 980), h: 44, value: subtitle, size: 27, weight: 500, color: "#aeb7c7", className: "cli-muted" }),
        ];
      }

      function panel({ x, y, w, h, border = "rgba(255,255,255,0.18)", fill = "rgba(255,255,255,0.048)", className = "" }) {
        return C.shapeBlock({ x, y, w, h, fill, radius: "8px", border: `1.2px solid ${border}`, className });
      }

      function card({ x, y, w, h, eyebrow, title, body, className = "" }) {
        return [
          panel({ x, y, w, h, className }),
          text({ x: x + 28, y: y + 24, w: w - 56, h: 24, value: eyebrow, size: 18, weight: 760, gradient: "deepBlue" }),
          text({ x: x + 28, y: y + 60, w: w - 56, h: 36, value: title, size: 30, weight: 740, gradient: "brand" }),
          text({ x: x + 28, y: y + 112, w: w - 56, h: h - 132, value: body, size: 22, weight: 480, color: "#aeb7c7", lineHeight: 1.38, className: "cli-muted" }),
        ];
      }

      function smallMetric({ x, y, w, title, body, className = "" }) {
        return [
          text({ x, y, w, h: 28, value: title, size: 22, weight: 720, align: "center", gradient: "deepBlue", className }),
          text({ x, y: y + 40, w, h: 52, value: body, size: 19, weight: 480, align: "center", color: "#aeb7c7", lineHeight: 1.28, className: "cli-muted" }),
        ];
      }

      function terminal({ x, y, w, h, command, lines = [] }) {
        return [
          C.shapeBlock({ x, y, w, h, fill: "rgba(3,10,23,0.78)", radius: "8px", border: "1.2px solid rgba(255,255,255,0.18)" }),
          htmlText({
            x: x + 30,
            y: y + 28,
            w: w - 60,
            h: h - 56,
            className: "cli-terminal",
            html: `<div class="cli-terminal"><div><span class="muted">$</span> ${command}<span class="cli-cursor"></span></div>${lines.map((line) => `<div>${line}</div>`).join("")}</div>`,
          }),
        ];
      }

      function flowLine({ x, y, w, id = "flow", h = 24 }) {
        return C.vectorBlock({
          x,
          y,
          w,
          h,
          className: "cli-flow",
          html: `<svg viewBox="0 0 ${w} ${h}" width="100%" height="100%" preserveAspectRatio="none"><line x1="0" y1="${h / 2}" x2="${w}" y2="${h / 2}" stroke="url(#${id})" stroke-width="4" stroke-linecap="round"/><defs><linearGradient id="${id}" x1="0" x2="1"><stop offset="0" stop-color="#ceeafe"/><stop offset="0.55" stop-color="#3ec3f7"/><stop offset="1" stop-color="#1456f0"/></linearGradient></defs></svg>`,
        });
      }

      function stepPill({ x, y, w, label, className = "" }) {
        return [
          C.shapeBlock({ x, y, w, h: 48, fill: "rgba(255,255,255,0.035)", radius: "6px", border: "1.2px solid rgba(62,195,247,0.34)", className }),
          text({ x, y: y + 8, w, h: 30, value: label, size: 21, weight: 620, align: "center", gradient: "deepBlue" }),
        ];
      }

      const deck = LarkSlides.createDeckSpec({
        title: "飞书 CLI 介绍",
        description: "基于飞书 CLI 能力介绍与最佳实践文档生成的 5 页以内 HTML 演示稿，突出 HTML 做 PPT 的可编辑、可动效和可发布优势。",
        theme: "larkVisual",
        meta: {
          sourceDoc: "https://bytedance.larkoffice.com/docx/WnHkdJQM6oGpQFxm9i7ckVdenSh",
        },
        slides: [
          T.visualLayout({
            sourceSlide: "cli-1",
            title: "飞书 CLI",
            blocks: [
              ...bg(),
              C.shapeBlock({ x: 1126, y: 94, w: 270, h: 46, fill: "rgba(62,195,247,0.065)", radius: "6px", border: "1.2px solid rgba(62,195,247,0.44)" }),
              text({ x: 1126, y: 104, w: 270, h: 28, value: "HTML PPT Prototype", size: 21, weight: 700, align: "center", gradient: "deepBlue" }),
              text({ x: FRAME.x, y: 172, w: 860, h: 78, value: "飞书 CLI", size: 72, weight: 780, gradient: "brand" }),
              text({ x: FRAME.x, y: 272, w: 900, h: 164, value: "给每个 Agent\n一双操作飞书的手", size: 72, weight: 760, gradient: "soft", lineHeight: 1.08 }),
              text({ x: FRAME.x + 2, y: 484, w: 790, h: 78, value: "让 AI 直接读消息、查日历、写文档、建多维表格、发邮件。", size: 30, weight: 500, color: "#aeb7c7", lineHeight: 1.34, className: "cli-muted" }),
              ...terminal({ x: FRAME.x, y: 636, w: 740, h: 112, command: "npx @larksuite/cli@latest install" }),
              panel({ x: 968, y: 210, w: 390, h: 460, border: "rgba(62,195,247,0.38)", fill: "rgba(62,195,247,0.045)" }),
              text({ x: 1010, y: 252, w: 306, h: 36, value: "Agent 能操作的飞书", size: 29, weight: 740, align: "center", gradient: "brand" }),
              ...stepPill({ x: 1012, y: 326, w: 130, label: "消息", className: "cli-rise-a" }),
              ...stepPill({ x: 1184, y: 326, w: 130, label: "日历", className: "cli-rise-b" }),
              ...stepPill({ x: 1012, y: 418, w: 130, label: "文档", className: "cli-rise-c" }),
              ...stepPill({ x: 1184, y: 418, w: 130, label: "Base", className: "cli-rise-d" }),
              flowLine({ x: 1042, y: 540, w: 244, id: "cover-line" }),
              C.shapeBlock({ x: 1154, y: 532, w: 18, h: 18, fill: "#3ec3f7", className: "cli-dot" }),
              text({ x: 1004, y: 590, w: 318, h: 42, value: "这就是 HTML 稿适合表达的部分：能力流转可以被演示，而不只是被描述。", size: 21, weight: 480, align: "center", color: "#aeb7c7", lineHeight: 1.28, className: "cli-muted" }),
            ],
          }),
          T.visualLayout({
            sourceSlide: "cli-2",
            title: "CLI 是什么",
            blocks: [
              ...bg(),
              ...title({ title: "一句话理解：把飞书加入 AI 工作流", subtitle: "不是让用户学习命令，而是给 Agent 一条可执行通道。" }),
              ...(() => {
                const grid = C.layoutGrid({ x: FRAME.x, y: 292, w: FRAME.w, columns: 3, gap: 48 });
                const a = grid.col(0);
                const b = grid.col(1);
                const c = grid.col(2);
                return [
                  ...card({ x: a.x, y: grid.y, w: a.w, h: 210, eyebrow: "01", title: "你说目标", body: "用自然语言描述要完成的工作，不需要记命令。", className: "cli-rise-a" }),
                  flowLine({ x: a.x + a.w + 16, y: 382, w: 16, id: "what-a" }),
                  ...card({ x: b.x, y: grid.y, w: b.w, h: 210, eyebrow: "02", title: "Agent 调 CLI", body: "读取 context、选择命令、处理权限提示和参数。", className: "cli-rise-b" }),
                  flowLine({ x: b.x + b.w + 16, y: 382, w: 16, id: "what-b" }),
                  ...card({ x: c.x, y: grid.y, w: c.w, h: 210, eyebrow: "03", title: "飞书写回结果", body: "创建文档、更新表格、发消息、建日程或处理邮件。", className: "cli-rise-c" }),
                  ...smallMetric({ x: a.x, y: 584, w: a.w, title: "Context", body: "消息、文档、日历、妙记、Base" }),
                  ...smallMetric({ x: b.x, y: 584, w: b.w, title: "Action", body: "创建、更新、搜索、发送、导出" }),
                  ...smallMetric({ x: c.x, y: 584, w: c.w, title: "Identity", body: "支持用户身份和应用身份" }),
                  C.shapeBlock({ x: FRAME.x, y: 714, w: FRAME.w, h: 3, fill: "linear-gradient(90deg,#ceeafe,#3ec3f7,#1456f0)", radius: "999px" }),
                ];
              })(),
            ],
          }),
          T.visualLayout({
            sourceSlide: "cli-3",
            title: "快速开始",
            blocks: [
              ...bg(),
              ...title({ title: "安装入口要和真实体验一致", subtitle: "手动安装是一行命令；Agent 安装是把安装请求发给你的 AI 工具。" }),
              ...(() => {
                const grid = C.layoutGrid({ x: FRAME.x, y: 268, w: FRAME.w, columns: 2, gap: 48 });
                const left = grid.col(0);
                const right = grid.col(1);
                return [
                  panel({ x: left.x, y: grid.y, w: left.w, h: 280, border: "rgba(255,255,255,0.2)" }),
                  text({ x: left.x + 34, y: grid.y + 30, w: left.w - 68, h: 36, value: "手动安装", size: 30, weight: 740, gradient: "brand" }),
                  text({ x: left.x + 34, y: grid.y + 78, w: left.w - 68, h: 34, value: "终端中执行官方安装命令", size: 22, weight: 480, color: "#aeb7c7", className: "cli-muted" }),
                  ...terminal({ x: left.x + 34, y: grid.y + 136, w: left.w - 68, h: 92, command: "npx @larksuite/cli@latest install" }),
                  panel({ x: right.x, y: grid.y, w: right.w, h: 280, border: "rgba(62,195,247,0.42)", fill: "rgba(62,195,247,0.045)" }),
                  text({ x: right.x + 34, y: grid.y + 30, w: right.w - 68, h: 36, value: "Agent 安装", size: 30, weight: 740, gradient: "brand" }),
                  text({ x: right.x + 34, y: grid.y + 78, w: right.w - 68, h: 34, value: "把这句话发给 Codex / Cursor / Claude Code", size: 22, weight: 480, color: "#aeb7c7", className: "cli-muted" }),
                  panel({ x: right.x + 34, y: grid.y + 136, w: right.w - 68, h: 92, border: "rgba(255,255,255,0.18)", fill: "rgba(4,11,25,0.72)" }),
                  text({ x: right.x + 58, y: grid.y + 158, w: right.w - 116, h: 48, value: "帮我安装飞书 CLI：https://open.feishu.cn/document/no_class/mcp-archive/feishu-cli-installation-guide.md", size: 20, weight: 560, color: "#f7f9ff", lineHeight: 1.28, className: "cli-code" }),
                  ...stepPill({ x: 244, y: 642, w: 250, label: "安装 CLI", className: "cli-rise-a" }),
                  flowLine({ x: 516, y: 654, w: 210, id: "start-a" }),
                  ...stepPill({ x: 748, y: 642, w: 250, label: "lark-cli auth login", className: "cli-rise-b" }),
                  flowLine({ x: 1020, y: 654, w: 210, id: "start-b" }),
                  ...stepPill({ x: 1252, y: 642, w: 250, label: "重启 Agent", className: "cli-rise-c" }),
                ];
              })(),
            ],
          }),
          T.visualLayout({
            sourceSlide: "cli-4",
            title: "工作流原型",
            blocks: [
              ...bg(),
              ...title({ title: "HTML 稿要能演示流程，而不是堆信息", subtitle: "用同一条流程线表达 CLI 把信息读取、判断、写回串成闭环。" }),
              C.shapeBlock({ x: FRAME.x, y: 466, w: FRAME.w, h: 4, fill: "rgba(255,255,255,0.16)", radius: "999px" }),
              flowLine({ x: FRAME.x, y: 456, w: FRAME.w, id: "workflow-main", h: 24 }),
              ...(() => {
                const grid = C.layoutGrid({ x: FRAME.x, y: 270, w: FRAME.w, columns: 4, gap: 34 });
                const items = [
                  ["A", "会议之后", "妙记识别待办"],
                  ["B", "文档协作", "读取评论并修订"],
                  ["C", "日程安排", "查忙闲后建会"],
                  ["D", "邮件处理", "摘要、分级、草稿"],
                ];
                return items.flatMap(([eyebrow, itemTitle, body], index) => {
                  const col = grid.col(index);
                  return [
                    C.shapeBlock({ x: col.x + col.w / 2 - 9, y: 458, w: 18, h: 18, fill: "#3ec3f7", className: "cli-dot" }),
                    ...card({ x: col.x, y: grid.y, w: col.w, h: 150, eyebrow, title: itemTitle, body, className: `cli-rise-${["a", "b", "c", "d"][index]}` }),
                    ...smallMetric({ x: col.x, y: 524, w: col.w, title: ["读取", "判断", "执行", "写回"][index], body: ["消息 / 妙记 / 文档", "Agent 规划动作", "CLI 调用飞书", "文档 / 表格 / 日程"][index] }),
                  ];
                });
              })(),
              panel({ x: 258, y: 686, w: 1084, h: 70, border: "rgba(62,195,247,0.36)", fill: "rgba(62,195,247,0.045)" }),
              text({ x: 298, y: 706, w: 1004, h: 32, value: "可动效的重点应该服务流程理解：线在流动，状态在推进，用户能看懂 Agent 正在做什么。", size: 25, weight: 620, align: "center", gradient: "deepBlue" }),
            ],
          }),
          T.visualLayout({
            sourceSlide: "cli-5",
            title: "HTML 做 PPT 的优势",
            blocks: [
              ...bg(),
              ...title({ title: "为什么用 HTML 做 PPT 讲飞书 CLI", subtitle: "CLI 是 Agent 的执行层，HTML 幻灯片是可维护、可上线、可做原型的表达层。" }),
              ...(() => {
                const grid = C.layoutGrid({ x: FRAME.x, y: 270, w: FRAME.w, columns: 4, gap: 34 });
                const items = [
                  ["01", "可编辑", "文字、标签、连线、图形都是 DOM。"],
                  ["02", "可动效", "流程线、状态点、输入光标可以服务演示。"],
                  ["03", "可发布", "字体和素材走 CDN，一个 URL 可预览。"],
                  ["04", "可复用", "布局、字体、标签、流程组件沉淀到 SDK。"],
                ];
                return items.flatMap(([eyebrow, itemTitle, body], index) => {
                  const col = grid.col(index);
                  return card({ x: col.x, y: grid.y, w: col.w, h: 180, eyebrow, title: itemTitle, body, className: `cli-rise-${["a", "b", "c", "d"][index]}` });
                });
              })(),
              ...terminal({
                x: FRAME.x,
                y: 556,
                w: 860,
                h: 128,
                command: "deck = LarkSlides.createDeckSpec({ theme: 'larkVisual' })",
                lines: ['<span class="ok">layoutGrid</span> + <span class="ok">editable DOM</span> + <span class="ok">Magic Pages URL</span>'],
              }),
              panel({ x: 1026, y: 556, w: 334, h: 128, border: "rgba(62,195,247,0.42)", fill: "rgba(62,195,247,0.045)" }),
              text({ x: 1060, y: 586, w: 266, h: 34, value: "这次补齐的标准组件", size: 24, weight: 720, align: "center", gradient: "brand" }),
              text({ x: 1060, y: 632, w: 266, h: 30, value: "layoutGrid：统一列宽、间距和起始边界", size: 19, weight: 480, align: "center", color: "#aeb7c7", className: "cli-muted" }),
              text({ x: 154, y: 748, w: 1240, h: 34, value: "GitHub：github.com/larksuite/cli    帮助：lark-cli help    更新：lark-cli update", size: 25, weight: 650, align: "center", gradient: "deepBlue", className: "cli-code" }),
            ],
          }),
        ],
      });

      LarkSlides.createDeck({
        mount: "#deck",
        deck,
        controls: new URLSearchParams(location.search).get("controls") !== "0",
      });
    </script>
  </body>
</html>

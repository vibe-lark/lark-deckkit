:root {
  color-scheme: light dark;
  --ls-app-bg: #111217;
  --ls-toolbar-bg: rgba(20, 22, 28, 0.86);
  --ls-toolbar-border: rgba(255, 255, 255, 0.12);
  --ls-toolbar-fg: #f5f7fb;
  --ls-muted-fg: rgba(245, 247, 251, 0.68);
  --ls-accent: #1456f0;
  --ls-slide-bg: #ffffff;
  --ls-control-size: 36px;
  --ls-radius: 8px;
}

html,
body {
  height: 100%;
}

body {
  margin: 0;
  background: var(--ls-app-bg);
  color: #1f2329;
  font-family: var(--ld-font-ui, "Inter", "FZLanTingHeiPro_GB18030", "PingFang SC", "Microsoft YaHei", Arial, sans-serif);
  overflow: hidden;
}

.ls-app {
  position: fixed;
  inset: 0;
  display: grid;
  grid-template-rows: 1fr auto;
  place-items: center;
  background: var(--ls-app-bg);
}

.ls-app[data-lark-theme="larkVisual"] {
  --ls-app-bg: #111217;
  --ls-slide-bg: #000000;
  --ls-accent: #1456f0;
}

.ls-stage {
  position: relative;
  width: min(100vw, calc((100vh - 72px) * 16 / 9));
  max-width: 100vw;
  aspect-ratio: 16 / 9;
  background: var(--ls-slide-bg);
  overflow: hidden;
  box-shadow: 0 18px 50px rgba(0, 0, 0, 0.34);
}

.ls-app.ls-no-controls {
  grid-template-rows: 1fr;
}

.ls-app.ls-no-controls .ls-stage {

}

.ls-app.ls-presenting {

  background: #000;
}

.ls-app.ls-presenting .ls-stage {

  opacity: 0;

}

    <script>
(function () {
  "use strict";

  const DEFAULT_SIZE = { width: 1600, height: 900 };
  const themes = {};

  defineTheme("default", {
    className: "ls-theme-default",
    cssVars: {},
  });

  defineTheme("larkVisual", {
    className: "ls-theme-lark-visual",
    cssVars: {
      "--ls-app-bg": "#111217",
      "--ls-slide-bg": "#000000",
      "--ls-accent": "#1456f0",
    },
  });

  function toElement(slide, index) {
    if (slide instanceof HTMLElement) return slide;

    const section = document.createElement("section");
    section.className = `ls-slide ${slide.className || ""}`.trim();
    section.dataset.index = String(index + 1);
    if (slide.id) section.id = slide.id;
    if (slide.title) section.dataset.title = slide.title;
    if (slide.template) section.dataset.template = slide.template;
    if (slide.sourceSlide) section.dataset.sourceSlide = String(slide.sourceSlide);
    section.setAttribute("aria-label", slide.title || `Slide ${index + 1}`);

    const inner = document.createElement("div");
    inner.className = "ls-slide-inner";
    inner.innerHTML = typeof slide === "string" ? slide : slide.content || "";
    section.appendChild(inner);
    return section;
  }

  function ensureStructure(mount) {
    let stage = mount.querySelector(":scope > .ls-stage");
    if (stage) return stage;

    stage = document.createElement("div");
    stage.className = "ls-stage";

    const existingSlides = Array.from(mount.querySelectorAll(":scope > .ls-slide"));
    for (const slide of existingSlides) stage.appendChild(slide);
    mount.appendChild(stage);
    return stage;
  }

  function ensureInner(slide) {
    let inner = slide.querySelector(":scope > .ls-slide-inner");
    if (!inner) {
      inner = document.createElement("div");
      inner.className = "ls-slide-inner";
      while (slide.firstChild) inner.appendChild(slide.firstChild);
      slide.appendChild(inner);
    }
    return inner;
  }

  function mountControls(deck) {
    if (!deck.options.controls) return null;

    const toolbar = document.createElement("div");
    toolbar.className = "ls-toolbar";
    toolbar.setAttribute("role", "toolbar");
    toolbar.setAttribute("aria-label", "Slide controls");

    const prev = button("上一页", "‹", () => deck.prev());
    const next = button("下一页", "›", () => deck.next());
    const fullscreen = button("全屏播放", "⛶", () => deck.toggleFullscreen());

    const status = document.createElement("div");
    status.className = "ls-status";
    status.setAttribute("aria-live", "polite");
    deck.status = status;

    toolbar.append(prev, status, next, fullscreen);
    deck.mount.appendChild(toolbar);

    const progress = document.createElement("div");
    progress.className = "ls-progress";
    const bar = document.createElement("div");
    bar.className = "ls-progress-bar";
    progress.appendChild(bar);
    deck.mount.appendChild(progress);
    deck.progressBar = bar;

    return toolbar;
  }

  function button(label, text, onClick) {
    const el = document.createElement("button");
    el.className = "ls-button";
    el.type = "button";
    el.setAttribute("aria-label", label);
    el.title = label;
    el.textContent = text;
    el.addEventListener("click", onClick);
    return el;
  }

  function renderDeck(deck) {
    if (deck.options.slides?.length) {
      deck.stage.replaceChildren(
        ...deck.options.slides.map((slide, index) => toElement(slide, index))
      );
    }

    deck.slides = Array.from(deck.stage.querySelectorAll(":scope > .ls-slide"));
    deck.slideInners = deck.slides.map((slide, index) => {
      const inner = ensureInner(slide);
      slide.dataset.index = slide.dataset.index || String(index + 1);
      setSlideActive(slide, index === deck.index);
      return inner;
    });

    if (!deck.controls) deck.controls = mountControls(deck);
    deck.updateScale();
    deck.goTo(deck.index, { replace: true });
    return deck;
  }

  function createDeck(rawOptions = {}) {
    const options = normalizeCreateOptions(rawOptions);
    const mount =
      typeof options.mount === "string"
        ? document.querySelector(options.mount)
        : options.mount || document.querySelector("[data-lark-deck]");

    if (!mount) throw new Error("LarkSlides: missing mount element");
    mount.classList.add("ls-app");
    mount.classList.toggle("ls-no-controls", options.controls === false);

    const deck = {
      mount,
      stage: ensureStructure(mount),
      options: {
        controls: options.controls !== false,
        keyboard: options.keyboard !== false,
        hash: options.hash !== false,
        size: options.size || DEFAULT_SIZE,
        slides: options.slides || null,
        theme: options.theme || "default",
        metadata: options.metadata || options.meta || {},
      },
      index: readHashIndex() || 0,
      slides: [],
      slideInners: [],
      controls: null,
      status: null,
      progressBar: null,
      scaleFrame: 0,
      scaleTransform: "",
      theme: null,
      updateScale,
      enterFullscreen,
      exitFullscreen,
      toggleFullscreen,
      syncPresentationState,
      isPresenting,
      renderDeck() {
        return renderDeck(this);
      },
      goTo(index, meta = {}) {
        const numeric = normalizeIndex(index, this.slides.length);
        const previous = this.index;
        this.index = numeric;
        setSlideActive(this.slides[previous], false);
        setSlideActive(this.slides[numeric], true);
        preloadNearbySlides(this.slides, numeric);
        if (this.status) this.status.textContent = `${numeric + 1} / ${this.slides.length}`;
        if (this.progressBar) {
          const width = this.slides.length <= 1 ? 100 : ((numeric + 1) / this.slides.length) * 100;
          this.progressBar.style.width = `${width}%`;
        }
        if (this.options.hash && !meta.replace) {
          history.replaceState(null, "", `#/${numeric + 1}`);
        }
        return this;
      },
      next() {
        return this.goTo(this.index + 1);
      },
      prev() {
        return this.goTo(this.index - 1);
      },
      destroy() {
        window.removeEventListener("resize", this.onResize);
        window.removeEventListener("hashchange", this.onHashChange);
        window.removeEventListener("keydown", this.onKeydown);
        document.removeEventListener("fullscreenchange", this.onFullscreenChange);
        cancelAnimationFrame(this.scaleFrame);
      },
    };

    deck.onResize = () => {
      cancelAnimationFrame(deck.scaleFrame);
      deck.scaleFrame = requestAnimationFrame(() => deck.updateScale());
    };
    deck.onHashChange = () => deck.goTo(readHashIndex() || 0, { replace: true });
    deck.onFullscreenChange = () => deck.syncPresentationState();
    deck.onKeydown = (event) => {
      if (!deck.options.keyboard) return;
      if (event.target?.isContentEditable) return;
      if (event.code === "Escape" && deck.isPresenting()) {
        event.preventDefault();
        deck.exitFullscreen();
        return;
      }
      if (["ArrowRight", "PageDown", "Space"].includes(event.code)) {
        event.preventDefault();
        deck.next();
      }
      if (["ArrowLeft", "PageUp"].includes(event.code)) {
        event.preventDefault();
        deck.prev();
      }
      if (event.code === "Home") deck.goTo(0);
      if (event.code === "End") deck.goTo(deck.slides.length - 1);
    };

    window.addEventListener("resize", deck.onResize);
    window.addEventListener("hashchange", deck.onHashChange);
    window.addEventListener("keydown", deck.onKeydown);
    document.addEventListener("fullscreenchange", deck.onFullscreenChange);

  function createDeckSpec({
    title = "",
    description = "",
    theme = "larkVisual",
    size = DEFAULT_SIZE,
    slides = [],
    assets = {},
    meta = {},
  } = {}) {
    return {
      title,
      description,
      theme,
      size,
      slides: Array.from(slides),
      assets: { ...assets },
      meta: { ...meta },
    };
  }

  function normalizeCreateOptions(options = {}) {
    const spec = options.deck || options.spec;
    if (!spec) return options;

    return {
      ...spec,
      ...options,
      slides: options.slides || spec.slides || [],
      size: options.size || spec.size || DEFAULT_SIZE,
      theme: options.theme || spec.theme || "default",
      metadata: options.metadata || options.meta || spec.meta || {},
    };
  }

  function defineTheme(name, theme = {}) {
    if (!name || typeof name !== "string") {
      throw new Error("LarkSlides: theme name is required");
    }
    const normalized = {
      name,
      className: theme.className || "",
      cssVars: { ...(theme.cssVars || {}) },
      meta: { ...(theme.meta || {}) },
    };
    themes[name] = normalized;
    return normalized;
  }

  function resolveTheme(theme = "default") {
    if (typeof theme === "string") return themes[theme] || themes.default;
    if (theme && typeof theme === "object") {
      return {
        name: theme.name || "custom",
        className: theme.className || "",
        cssVars: { ...(theme.cssVars || {}) },
        meta: { ...(theme.meta || {}) },
      };
    }
    return themes.default;
  }

  function applyTheme(target, themeInput = "default") {
    const mount = target?.mount || target;
    const theme = resolveTheme(themeInput);
    if (!mount) return theme;

    if (mount.__larkThemeClass) mount.classList.remove(mount.__larkThemeClass);
    (mount.__larkThemeVars || []).forEach((property) => mount.style.removeProperty(property));

    if (mount.dataset) mount.dataset.larkTheme = theme.name;
    if (theme.className) mount.classList.add(theme.className);
    Object.entries(theme.cssVars || {}).forEach(([property, value]) => {
      mount.style.setProperty(property, value);
    });
    mount.__larkThemeClass = theme.className;
    mount.__larkThemeVars = Object.keys(theme.cssVars || {});
    return theme;
  }

  function updateScale() {
    const size = this?.options?.size || DEFAULT_SIZE;
    const stage = this?.stage || document.querySelector(".ls-stage");
    if (!stage) return;
    const scale = Math.min(stage.clientWidth / size.width, stage.clientHeight / size.height);
    const offsetX = (stage.clientWidth - size.width * scale) / 2;
    const offsetY = (stage.clientHeight - size.height * scale) / 2;
    const transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
    if (this?.stage && this.scaleTransform === transform) return;
    if (this?.stage) this.scaleTransform = transform;

    const inners = this?.slideInners?.length
      ? this.slideInners
      : Array.from(stage.querySelectorAll(".ls-slide-inner"));
    inners.forEach((inner) => {
      inner.style.transform = transform;
    });
  }

  function enterFullscreen() {
    if (document.fullscreenElement === this.mount) return Promise.resolve(this);
    if (!this.mount.requestFullscreen) {
      this.syncPresentationState(true);
      return Promise.resolve(this);
    }
    return this.mount.requestFullscreen().then(() => this);
  }

  function exitFullscreen() {
    if (document.fullscreenElement === this.mount && document.exitFullscreen) {
      return document.exitFullscreen().then(() => this);
    }
    this.syncPresentationState(false);
    return Promise.resolve(this);
  }

  function toggleFullscreen() {
    return this.isPresenting() ? this.exitFullscreen() : this.enterFullscreen();
  }

  function isPresenting() {
    return this.mount.classList.contains("ls-presenting") || document.fullscreenElement === this.mount;
  }

  function syncPresentationState(force) {
    const isFullscreen = force ?? document.fullscreenElement === this.mount;
    this.mount.classList.toggle("ls-presenting", Boolean(isFullscreen));
    cancelAnimationFrame(this.scaleFrame);
    this.scaleFrame = requestAnimationFrame(() => this.updateScale());
    return this;
  }

  function setSlideActive(slide, isActive) {
    if (!slide) return;
    slide.hidden = !isActive;
    slide.classList.toggle("is-active", isActive);
  }

  function preloadNearbySlides(slides, index) {
    loadSlideImages(slides[index]);
    loadSlideImages(slides[index - 1]);
    loadSlideImages(slides[index + 1]);
    loadSlideImages(slides[index - 2]);
    loadSlideImages(slides[index + 2]);
  }

  function loadSlideImages(slide) {
    if (!slide) return;
    slide.querySelectorAll("img[data-src]").forEach((image) => {
      const source = image.dataset.src;
      if (!source) return;
      if (image.getAttribute("src") !== source) {
        image.classList.add("is-loading");
        image.addEventListener("load", markImageLoaded, { once: true });
        image.addEventListener("error", markImageLoaded, { once: true });
        image.setAttribute("src", source);
      }
      if (image.complete && image.getAttribute("src") === source) {
        markImageLoaded({ currentTarget: image });
      }
    });
  }

  function markImageLoaded(event) {
    const image = event.currentTarget;
    image.classList.remove("is-loading");
    image.classList.add("is-loaded");
    image.dataset.lsLoaded = "true";
  }

  function normalizeIndex(index, length) {
    const numeric = Number(index);
    if (!Number.isFinite(numeric) || length <= 0) return 0;
    return Math.max(0, Math.min(length - 1, Math.trunc(numeric)));
  }

  function readHashIndex() {
    const match = location.hash.match(/^#\/(\d+)$/);
    if (!match) return 0;
    return Math.max(0, Number(match[1]) - 1);
  }

  window.LarkSlides = {
    themes,
    createDeckSpec,
    createDeck,
    renderDeck,
    mountControls,
    defineTheme,
    applyTheme,
    enterFullscreen(deck) {
      return deck.enterFullscreen();
    },
    exitFullscreen(deck) {
      return deck.exitFullscreen();
    },
    toggleFullscreen(deck) {
      return deck.toggleFullscreen();
    },
    goTo(deck, index) {
      return deck.goTo(index);
    },
    next(deck) {
      return deck.next();
    },
    prev(deck) {
      return deck.prev();
    },
  };
})();

    <script>
(function () {
  "use strict";

  function escapeHtml(value) {

      .replace(/>/g, "&gt;")

      black: "#000000",
      white: "#ffffff",

      soft: "linear-gradient(90deg, #ffffff 0%, #e2fff7 38%, #b1d5f6 68%, #80a3ff 100%)",
      gray: "linear-gradient(90deg, #e6e8ee 0%, #b5bac4 52%, #858b96 100%)",
      whiteGray: "linear-gradient(90deg, #f7f9ff 0%, #d9dee8 48%, #9ea8b8 100%)",

      zh: "var(--ld-font-zh, \"FZLanTingHeiPro_GB18030\", \"PingFang SC\", \"Microsoft YaHei\", Arial, sans-serif)",
      ui: "var(--ld-font-ui, \"Inter\", \"FZLanTingHeiPro_GB18030\", \"PingFang SC\", \"Microsoft YaHei\", Arial, sans-serif)",

    if (x != null) parts.push(`left:${Number(x).toFixed(3)}px;`);
    if (y != null) parts.push(`top:${Number(y).toFixed(3)}px;`);
    if (w != null) parts.push(`width:${Number(w).toFixed(3)}px;`);
    if (h != null) parts.push(`height:${Number(h).toFixed(3)}px;`);
    if (style) parts.push(style);
    return parts.join("");
  }

  function gradientClass(gradient) {
    if (!gradient) return "";
    const variants = {
      brand: "brand",
      soft: "soft",
      gray: "gray",
      whiteGray: "white-gray",
      deepBlue: "deep-blue",

      `font-weight:${escapeHtml(weight)};`,

    x = 0,
    y = 0,
    w = tokens.canvas.width,

    className = "",
    style = "",
    innerStyle,

      kind: "image",
      className,
      src,
      style: geometryStyle({ x, y, w, h, style }),

    x,
    y,
    w,
    h,
    fill = "transparent",
    radius,
    border,
    opacity,
    className = "",
    style = "",
  } = {}) {
    const shapeStyle = [
      `background:${fill};`,
      radius ? `border-radius:${escapeHtml(radius)};` : "",
      border ? `border:${border};` : "",
      opacity != null ? `opacity:${Number(opacity).toFixed(3)};` : "",

    return {
      x: Number(x),
      y: Number(y),
      w: Number(w),
      columns: safeColumns,
      gap: safeGap,
      colW,
      col(index = 0, span = 1) {
        const safeSpan = Math.max(1, Number(span) || 1);
        return {

  function blockStyle(block = {}) {
    if (block.style) return block.style;
    const parts = ["position:absolute;"];
    if (block.x != null) parts.push(`left:${Number(block.x).toFixed(3)}px;`);
    if (block.y != null) parts.push(`top:${Number(block.y).toFixed(3)}px;`);
    if (block.w != null) parts.push(`width:${Number(block.w).toFixed(3)}px;`);
    if (block.h != null) parts.push(`height:${Number(block.h).toFixed(3)}px;`);
    if (block.opacity != null) parts.push(`opacity:${Number(block.opacity).toFixed(3)};`);
    if (block.fill) parts.push(`background:${block.fill};`);
    if (block.color) parts.push(`color:${block.color};`);
    if (block.size) parts.push(`font-size:${Number(block.size).toFixed(3)}px;`);
    if (block.weight) parts.push(`font-weight:${escapeHtml(block.weight)};`);
    if (block.align) parts.push(`text-align:${escapeHtml(block.align)};`);
    if (block.lineHeight) parts.push(`line-height:${escapeHtml(block.lineHeight)};`);
    if (block.radius) parts.push(`border-radius:${escapeHtml(block.radius)};`);
    if (block.border) parts.push(`border:${block.border};`);

      return `

          <img data-src="${escapeHtml(block.src)}" alt="" decoding="async" style="${innerStyle}">
        </div>
      `;
    }
    if (block.kind === "shape") {
      return `<div class="lvg-layout-block lvg-layout-shape${className}" style="${style}"></div>`;
    }
    if (block.kind === "vector" || block.kind === "raw") {
      return `<div class="lvg-layout-block lvg-layout-vector${className}" style="${style}">${block.html || ""}</div>`;
    }
    if (block.kind === "text") {
      const body = block.html != null ? block.html : escapeHtml(block.text || "");
      return `<div class="lvg-layout-block lvg-layout-text${className}" contenteditable="true" style="${style}">${body}</div>`;

      const A = (name) => MAGIC_ASSET_URLS[name] || "";
      const T = LarkSlideTemplates;

      function bg() {
        return [
          C.imageBlock({ src: A("e2cc3c0d5dc3155d.png") }),
          C.imageBlock({ src: A("b4906f8983e9cecf.png"), x: 34, y: -900, w: 1532, h: 1800 }),
          C.imageBlock({ src: A("fe0be4b4d6325923.png") }),
        ];
      }

      function text({ x, y, w, h, value, size = 34, weight = 620, color = "#f7f8fb", align = "left", gradient = "", className = "", lineHeight = 1.18 }) {
        return C.textBlock({ x, y, w, h, text: value, size, weight, color, align, gradient, className, lineHeight });
      }

      function htmlText({ x, y, w, h, html, className = "" }) {
        return { kind: "text", className, style: `left:${x}px;top:${y}px;width:${w}px;height:${h}px;background:transparent;`, html };
      }

      function raw({ x, y, w, h, html, className = "" }) {
        return C.vectorBlock({ x, y, w, h, html, className });
      }

      function title({ title, subtitle, y = 92, w = 1120 }) {
        return [
          text({ x: FRAME.x, y, w, h: 68, value: title, size: 54, weight: 760, gradient: "brand" }),
          text({ x: FRAME.x + 2, y: y + 78, w: Math.min(w, 1010), h: 44, value: subtitle, size: 27, weight: 500, color: "#aeb7c7", className: "cli-muted" }),
        ];
      }

      function panel({ x, y, w, h, border = "rgba(255,255,255,0.18)", fill = "rgba(255,255,255,0.048)", className = "" }) {
        return C.shapeBlock({ x, y, w, h, fill, radius: "8px", border: `1.2px solid ${border}`, className });
      }

      function card({ x, y, w, h, eyebrow, title, body, className = "" }) {
        return [
          panel({ x, y, w, h, className }),
          text({ x: x + 28, y: y + 24, w: w - 56, h: 24, value: eyebrow, size: 18, weight: 760, gradient: "deepBlue" }),
          text({ x: x + 28, y: y + 60, w: w - 56, h: 36, value: title, size: 30, weight: 740, gradient: "brand" }),
          text({ x: x + 28, y: y + 112, w: w - 56, h: h - 132, value: body, size: 22, weight: 480, color: "#aeb7c7", lineHeight: 1.38, className: "cli-muted" }),
        ];
      }

      function metric({ x, y, w, value, label, suffix = "" }) {

          C.shapeBlock({ x, y, w, h: 118, fill: "rgba(3,10,23,0.52)", radius: "8px", border: "1.1px solid rgba(62,195,247,0.26)" }),
          text({ x: x + 18, y: y + 22, w: w - 36, h: 44, value, size: 43, weight: 780, align: "center", gradient: "soft", className: "cli-code" }),
          text({ x: x + 18, y: y + 68, w: w - 36, h: 26, value: `${label}${suffix}`, size: 19, weight: 560, align: "center", color: "#aeb7c7", className: "cli-muted" }),
        ];
      }

      function todoItem({ x, y, w, label, title, body, chips = [], className = "" }) {
        const blocks = [
          C.shapeBlock({ x, y, w, h: 94, fill: "rgba(3,10,23,0.62)", radius: "8px", border: "1.1px solid rgba(62,195,247,0.22)", className }),
          C.shapeBlock({ x: x + 26, y: y + 31, w: 32, h: 32, fill: "rgba(62,195,247,0.12)", radius: "6px", border: "1.2px solid rgba(62,195,247,0.62)" }),
          text({ x: x + 26, y: y + 33, w: 32, h: 28, value: "✓", size: 22, weight: 760, align: "center", gradient: "deepBlue" }),
          text({ x: x + 82, y: y + 20, w: 138, h: 28, value: label, size: 20, weight: 720, gradient: "deepBlue" }),
          text({ x: x + 82, y: y + 50, w: 224, h: 32, value: title, size: 27, weight: 740, gradient: "brand" }),
          text({ x: x + 322, y: y + 26, w: chips.length ? 376 : w - 356, h: 44, value: body, size: 21, weight: 500, color: "#aeb7c7", lineHeight: 1.3, className: "cli-muted" }),
        ];
        if (chips.length) {
          chips.forEach((chip, index) => {
            const chipX = x + 728 + index * 156;
            blocks.push(C.shapeBlock({ x: chipX, y: y + 29, w: 132, h: 36, fill: "rgba(255,255,255,0.04)", radius: "6px", border: "1px solid rgba(62,195,247,0.30)" }));
            blocks.push(text({ x: chipX, y: y + 37, w: 132, h: 20, value: chip, size: 15, weight: 620, align: "center", color: "#dceeff", className: "cli-code" }));
          });
        }
        return blocks;
      }

      function miniStep({ x, y, w, h, title, body, command, className = "" }) {
        return [
          panel({ x, y, w, h, border: "rgba(62,195,247,0.28)", fill: "rgba(255,255,255,0.04)", className }),

      const installSteps = {
        install: {
          command: "npx @larksuite/cli@latest install",

          status: "ready",

          note: "如果你希望 AI 工具代办安装，把这句话直接发给 Agent。Agent 会根据安装指南执行。",
          status: "agent prompt copied",
        },

          command: "lark-cli auth login",
          note: "需要访问你的日历、消息、文档、邮箱等个人数据时，执行用户授权。后续缺权限时也可以按提示补授权。",
          status: "identity: user",
        },
        doctor: {
          command: "lark-cli doctor",
          note: "安装和授权后，用 doctor 检查配置、认证和连通性。这个步骤最接近真实的安装验收。",
          status: "health check",
        },
        first: {
          command: "帮我创建一篇云文档，介绍飞书 CLI 的能力，以及我可以先用哪些能力",
          note: "最后回到自然语言。你给目标，Agent 选择 CLI 能力并执行，关键动作前让你确认。",
          status: "first task",
        },
      };

      function copyText(value) {
        if (navigator.clipboard && window.isSecureContext) return navigator.clipboard.writeText(value);
        const input = document.createElement("textarea");
        input.value = value;
        input.style.position = "fixed";
        input.style.opacity = "0";
        document.body.appendChild(input);
        input.select();
        document.execCommand("copy");
        input.remove();
        return Promise.resolve();
      }

      function bindInstallDemo() {
        document.querySelectorAll("[data-install-demo]").forEach((demo) => {
          const commandEl = demo.querySelector("[data-install-command]");
          const noteEl = demo.querySelector("[data-install-note]");
          const statusEl = demo.querySelector("[data-install-status]");
          const copyButton = demo.querySelector("[data-copy-command]");
          demo.querySelectorAll("[data-install-step]").forEach((button) => {
            button.addEventListener("click", () => {
              const step = installSteps[button.dataset.installStep] || installSteps.install;
              demo.querySelectorAll("[data-install-step]").forEach((item) => item.classList.toggle("is-active", item === button));
              commandEl.textContent = step.command;
              noteEl.textContent = step.note;
              statusEl.textContent = step.status;
              copyButton.textContent = "复制";
            });
          });
          copyButton.addEventListener("click", () => {
            copyButton.textContent = "已复制";
            copyText(commandEl.textContent).catch(() => {});
            setTimeout(() => {
              copyButton.textContent = "复制";
            }, 1400);
          });
        });
      }

      LarkSlides.createDeck({
        mount: "#deck",
        deck,
        controls: new URLSearchParams(location.search).get("controls") !== "0",
      });
      bindInstallDemo();
    </script>
